<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump — Flocade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0221;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }
    a.back {
      color: #00f0ff;
      font-size: 0.7rem;
      text-decoration: none;
    }
    canvas {
      border: 2px solid #ff2e88;
      box-shadow: 0 0 20px rgba(255, 46, 136, 0.35);
      max-width: 100%;
      touch-action: none;
    }
    .hint { font-size: 0.6rem; color: #9b93b8; text-align: center; line-height: 2; }
  </style>
</head>
<body>
  <a class="back" href="../../">&larr; FLOCADE</a>
  <canvas id="game" width="800" height="450"></canvas>
  <p class="hint">Jump: tap / click / space / &uarr; &middot; Dodge 10 fireballs to slay the dragon &middot; High ones fly over you — don't jump into them!</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const GROUND = H - 60;
    const DODGES_TO_WIN = 10;
    const MAX_HEARTS = 3;

    // ---------- sound ----------
    let audio = null;
    function beep(freq, dur, type = 'square', vol = 0.08, slide = 0) {
      if (!audio) return;
      const o = audio.createOscillator(), g = audio.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, audio.currentTime);
      if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), audio.currentTime + dur);
      g.gain.setValueAtTime(vol, audio.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + dur);
      o.connect(g).connect(audio.destination);
      o.start();
      o.stop(audio.currentTime + dur);
    }
    const sfx = {
      jump()    { beep(300, 0.15, 'square', 0.06, 300); },
      dodge()   { beep(660, 0.08, 'square', 0.05); },
      hit()     { beep(160, 0.3, 'sawtooth', 0.1, -100); },
      shoot()   { beep(90, 0.2, 'sawtooth', 0.05, 60); },
      victory() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.07), i * 130)); },
      dead()    { [392, 330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.25, 'triangle', 0.08), i * 180)); },
    };

    // ---------- state ----------
    let state = 'title'; // title | playing | victory | gameover
    let level = 1;
    let dodges = 0;
    let totalScore = 0;
    let hearts = MAX_HEARTS;
    let shake = 0;
    let stateTime = 0;

    const hero = { x: 110, y: GROUND, vy: 0, w: 30, h: 46, onGround: true, invuln: 0, run: 0 };
    const dragon = { x: W - 105, mouth: 0, charge: 0, flap: 0, dying: 0, hover: 0 };
    let fireballs = [];
    let particles = [];
    let shootTimer = 1.5;
    let pendingDouble = 0;

    const stars = Array.from({ length: 70 }, () => ({
      x: Math.random() * W, y: Math.random() * (GROUND - 40), r: Math.random() * 1.6 + 0.4, tw: Math.random() * 6,
    }));

    function levelCfg(n) {
      return {
        speed: 4.2 + (n - 1) * 0.85,
        minGap: Math.max(0.55, 1.5 - (n - 1) * 0.12),
        maxGap: Math.max(0.95, 2.3 - (n - 1) * 0.17),
        doubleChance: Math.min(0.45, (n - 1) * 0.09),
        highChance: n >= 3 ? Math.min(0.35, 0.1 + (n - 3) * 0.06) : 0,
        telegraph: Math.max(0.28, 0.5 - (n - 1) * 0.03),
      };
    }

    function startLevel(n) {
      level = n;
      dodges = 0;
      hearts = MAX_HEARTS;
      fireballs = [];
      particles = [];
      hero.x = 110; hero.y = GROUND; hero.vy = 0; hero.onGround = true; hero.invuln = 0;
      dragon.charge = 0; dragon.mouth = 0; dragon.dying = 0;
      shootTimer = 1.6;
      pendingDouble = 0;
      state = 'playing';
      stateTime = 0;
    }

    // ---------- input ----------
    function jump() {
      if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
      if (state === 'title') { totalScore = 0; startLevel(1); return; }
      if (state === 'gameover' && stateTime > 0.8) { totalScore = 0; startLevel(1); return; }
      if (state === 'playing' && hero.onGround) {
        hero.vy = -13.5;
        hero.onGround = false;
        sfx.jump();
      }
    }
    function jumpRelease() {
      if (hero.vy < -5) hero.vy = -5; // short hop when released early
    }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        if (!e.repeat) jump();
        e.preventDefault();
      }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') jumpRelease();
    });
    canvas.addEventListener('pointerdown', e => { e.preventDefault(); jump(); });
    canvas.addEventListener('pointerup', jumpRelease);

    // ---------- particles ----------
    function burst(x, y, color, n, speed) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, s = (0.3 + Math.random()) * speed;
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, life: 0.5 + Math.random() * 0.5, color, r: 2 + Math.random() * 3 });
      }
    }

    // ---------- shooting ----------
    function spitFireball(cfg, high) {
      const y = high ? GROUND - 112 : GROUND - 22;
      fireballs.push({ x: dragon.x - 55, y, r: 13, vx: -cfg.speed, dodged: false, high, wob: Math.random() * 6 });
      dragon.mouth = 0.25;
      sfx.shoot();
      burst(dragon.x - 55, y, '#ff9d00', 6, 3);
    }

    // ---------- update ----------
    function update(dt) {
      const f = dt * 60; // frame-normalized
      stateTime += dt;
      shake = Math.max(0, shake - dt * 30);
      dragon.flap += dt * (state === 'victory' ? 2 : 6);
      dragon.hover += dt * 2;
      hero.run += dt * 10;

      // particles always animate
      particles = particles.filter(p => (p.life -= dt) > 0);
      for (const p of particles) {
        p.x += p.vx * f; p.y += p.vy * f; p.vy += 0.15 * f;
      }

      if (state === 'playing') {
        const cfg = levelCfg(level);

        // hero physics
        if (!hero.onGround) {
          hero.vy += 0.55 * f;
          hero.y += hero.vy * f;
          if (hero.y >= GROUND) {
            hero.y = GROUND; hero.vy = 0; hero.onGround = true;
            burst(hero.x, GROUND, '#9b93b8', 4, 1.5);
          }
        }
        hero.invuln = Math.max(0, hero.invuln - dt);

        // dragon shooting with telegraph
        if (pendingDouble > 0) {
          pendingDouble -= dt;
          if (pendingDouble <= 0) spitFireball(cfg, false);
        } else {
          shootTimer -= dt;
          dragon.charge = shootTimer < cfg.telegraph ? 1 - shootTimer / cfg.telegraph : 0;
          if (shootTimer <= 0) {
            const high = Math.random() < cfg.highChance;
            spitFireball(cfg, high);
            if (!high && Math.random() < cfg.doubleChance) pendingDouble = 0.38;
            shootTimer = cfg.minGap + Math.random() * (cfg.maxGap - cfg.minGap);
            dragon.charge = 0;
          }
        }
        dragon.mouth = Math.max(0, dragon.mouth - dt);

        // fireballs
        for (const b of fireballs) {
          b.x += b.vx * f;
          b.wob += dt * 12;
          particles.push({ x: b.x + b.r, y: b.y + Math.sin(b.wob) * 3, vx: 0.5, vy: (Math.random() - 0.5) * 0.5, life: 0.3, color: Math.random() < 0.5 ? '#ff9d00' : '#ffe600', r: 2 + Math.random() * 2 });

          // dodge counting
          if (!b.dodged && b.x + b.r < hero.x - hero.w / 2 - 6) {
            b.dodged = true;
            dodges++;
            totalScore++;
            sfx.dodge();
            if (dodges >= DODGES_TO_WIN) {
              for (const fb of fireballs) if (!fb.dodged) burst(fb.x, fb.y, '#ff9d00', 8, 2);
              fireballs = [];
              state = 'victory';
              stateTime = 0;
              dragon.dying = 0;
              sfx.victory();
              break;
            }
          }

          // collision (circle vs hero rect)
          if (hero.invuln <= 0 && !b.dodged) {
            const hx = hero.x, top = hero.y - hero.h;
            const cx = Math.max(hx - hero.w / 2, Math.min(b.x, hx + hero.w / 2));
            const cy = Math.max(top, Math.min(b.y, hero.y));
            const dx = b.x - cx, dy = b.y - cy;
            if (dx * dx + dy * dy < b.r * b.r) {
              b.dead = true;
              hearts--;
              hero.invuln = 1.3;
              shake = 8;
              sfx.hit();
              burst(b.x, b.y, '#ff2e88', 16, 4);
              if (hearts <= 0) {
                state = 'gameover';
                stateTime = 0;
                sfx.dead();
              }
            }
          }
        }
        fireballs = fireballs.filter(b => !b.dead && b.x > -40);

      } else if (state === 'victory') {
        // finish any jump in progress so the hero doesn't freeze mid-air
        if (!hero.onGround) {
          hero.vy += 0.55 * f;
          hero.y += hero.vy * f;
          if (hero.y >= GROUND) { hero.y = GROUND; hero.vy = 0; hero.onGround = true; }
        }
        // dragon collapses, hero runs to the right
        dragon.dying = Math.min(1, dragon.dying + dt * 0.7);
        if (stateTime > 0.6 && hero.x < dragon.x - 90) {
          hero.x += 3.2 * f;
        }
        if (Math.random() < 0.15) {
          burst(Math.random() * W, Math.random() * (GROUND - 100), ['#ff2e88', '#00f0ff', '#ffe600'][Math.floor(Math.random() * 3)], 5, 2);
        }
        if (stateTime > 3.2) startLevel(level + 1);
      }
    }

    // ---------- drawing ----------
    function drawHero() {
      if (hero.invuln > 0 && Math.floor(hero.invuln * 12) % 2 === 0) return; // flash
      const x = hero.x, y = hero.y;
      ctx.save();
      ctx.translate(x, y);

      // legs
      ctx.fillStyle = '#2a2450';
      if (hero.onGround) {
        const step = (state === 'victory' && hero.x < dragon.x - 90) ? Math.sin(hero.run) * 4 : 0;
        ctx.fillRect(-11, -14, 8, 14 + step * 0.5);
        ctx.fillRect(3, -14, 8, 14 - step * 0.5);
      } else {
        ctx.fillRect(-12, -16, 8, 12);
        ctx.fillRect(4, -12, 8, 12);
      }
      // boots
      ctx.fillStyle = '#ffe600';
      ctx.fillRect(-12, -4, 10, 4);
      ctx.fillRect(2, -4, 10, 4);
      // body armour
      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(-13, -34, 26, 21);
      ctx.fillStyle = '#00b0c0';
      ctx.fillRect(-13, -34, 26, 4);
      // arms
      ctx.fillStyle = '#00d0e0';
      ctx.fillRect(-17, -32, 5, 14);
      ctx.fillRect(12, -32, 5, 14);
      // head + helmet
      ctx.fillStyle = '#ffd9b3';
      ctx.fillRect(-9, -46, 18, 13);
      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(-10, -50, 20, 7);
      ctx.fillRect(-10, -46, 4, 8);
      // plume
      ctx.fillStyle = '#ff2e88';
      ctx.fillRect(-2, -58, 5, 9);
      // eye
      ctx.fillStyle = '#0d0221';
      ctx.fillRect(3, -42, 3, 3);
      // little sword on back
      ctx.fillStyle = '#9b93b8';
      ctx.fillRect(-19, -46, 3, 16);
      ctx.fillStyle = '#ffe600';
      ctx.fillRect(-21, -33, 7, 3);
      ctx.restore();
    }

    function drawDragon() {
      const d = dragon;
      const dy = d.dying;
      const bob = Math.sin(d.hover) * 4 * (1 - dy);
      ctx.save();
      ctx.translate(d.x, GROUND + bob + dy * 26);
      ctx.rotate(dy * 0.9);
      ctx.globalAlpha = state === 'victory' && stateTime > 2.4 ? Math.max(0, 1 - (stateTime - 2.4) * 1.4) : 1;

      const green = '#5cf042', dark = '#2e8f1e', belly = '#c9f76f';

      // tail
      ctx.strokeStyle = green;
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(20, -35);
      ctx.quadraticCurveTo(65, -50, 78, -95 + Math.sin(d.flap * 0.5) * 6);
      ctx.stroke();
      ctx.fillStyle = '#ffe600';
      ctx.beginPath();
      ctx.moveTo(70, -105); ctx.lineTo(90, -95); ctx.lineTo(72, -85);
      ctx.closePath(); ctx.fill();

      // wing (flapping)
      const wing = Math.sin(d.flap) * 22 * (1 - dy);
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(5, -60);
      ctx.quadraticCurveTo(45, -110 - wing, 62, -75 - wing);
      ctx.quadraticCurveTo(35, -72, 5, -60);
      ctx.closePath(); ctx.fill();

      // body
      ctx.fillStyle = green;
      ctx.beginPath();
      ctx.ellipse(15, -38, 34, 30, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = belly;
      ctx.beginPath();
      ctx.ellipse(2, -30, 18, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      // legs
      ctx.fillStyle = dark;
      ctx.fillRect(-5, -14, 10, 14);
      ctx.fillRect(20, -14, 10, 14);

      // neck + head (faces left)
      ctx.fillStyle = green;
      ctx.beginPath();
      ctx.moveTo(-10, -50);
      ctx.quadraticCurveTo(-28, -75, -38, -82);
      ctx.lineTo(-20, -92);
      ctx.quadraticCurveTo(-5, -70, 5, -55);
      ctx.closePath(); ctx.fill();

      // head
      const jaw = Math.max(dragon.mouth * 2.5, dragon.charge * 0.8) * (1 - dy);
      ctx.save();
      ctx.translate(-40, -88);
      ctx.fillStyle = green;
      ctx.beginPath();
      ctx.ellipse(0, 0, 17, 13, 0, 0, Math.PI * 2);
      ctx.fill();
      // snout top
      ctx.fillRect(-30, -8, 30, 9);
      // jaw (opens)
      ctx.save();
      ctx.rotate(jaw * 0.5);
      ctx.fillStyle = dark;
      ctx.fillRect(-28, 2, 28, 6);
      ctx.restore();
      // horns
      ctx.fillStyle = '#ffe600';
      ctx.beginPath(); ctx.moveTo(5, -12); ctx.lineTo(12, -24); ctx.lineTo(14, -10); ctx.closePath(); ctx.fill();
      // eye — angry, goes X when dead
      if (dy > 0.4) {
        ctx.strokeStyle = '#0d0221'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-12, -8); ctx.lineTo(-4, 0); ctx.moveTo(-4, -8); ctx.lineTo(-12, 0);
        ctx.stroke();
      } else {
        ctx.fillStyle = dragon.charge > 0 ? '#ff2e88' : '#ffe600';
        ctx.beginPath(); ctx.arc(-8, -4, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0d0221';
        ctx.fillRect(-9, -6, 2, 4);
      }
      // charge-up glow in mouth
      if (dragon.charge > 0 && state === 'playing') {
        ctx.fillStyle = `rgba(255, 157, 0, ${dragon.charge * 0.9})`;
        ctx.beginPath(); ctx.arc(-26, 4, 4 + dragon.charge * 6, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();

      ctx.restore();
    }

    function drawFireball(b) {
      const y = b.y + Math.sin(b.wob) * 3;
      const g = ctx.createRadialGradient(b.x, y, 1, b.x, y, b.r + 4);
      g.addColorStop(0, '#fff7d0');
      g.addColorStop(0.4, '#ffe600');
      g.addColorStop(0.8, '#ff9d00');
      g.addColorStop(1, 'rgba(255, 46, 46, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x, y, b.r + 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHUD() {
      ctx.textAlign = 'left';
      ctx.font = '12px "Press Start 2P"';
      // hearts
      for (let i = 0; i < MAX_HEARTS; i++) {
        ctx.fillStyle = i < hearts ? '#ff2e88' : '#3a2f5e';
        ctx.fillText('♥', 16 + i * 22, 28);
      }
      // level
      ctx.fillStyle = '#00f0ff';
      ctx.fillText('LEVEL ' + level, 16, 52);
      // score
      ctx.textAlign = 'right';
      ctx.fillStyle = '#ffe600';
      ctx.fillText('SCORE ' + totalScore, W - 16, 52);

      // dragon HP bar
      const bw = 200, bx = W - 16 - bw;
      ctx.fillStyle = '#3a2f5e';
      ctx.fillRect(bx, 16, bw, 12);
      const hp = Math.max(0, DODGES_TO_WIN - dodges) / DODGES_TO_WIN;
      ctx.fillStyle = '#5cf042';
      ctx.fillRect(bx, 16, bw * hp, 12);
      ctx.strokeStyle = '#9b93b8';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx - 0.5, 15.5, bw + 1, 13);
      ctx.font = '8px "Press Start 2P"';
      ctx.fillStyle = '#9b93b8';
      ctx.fillText('DRAGON', bx - 8, 26);
      ctx.textAlign = 'left';
    }

    function centerText(lines, y0) {
      ctx.textAlign = 'center';
      let y = y0;
      for (const [text, size, color] of lines) {
        ctx.font = size + 'px "Press Start 2P"';
        ctx.fillStyle = color;
        ctx.fillText(text, W / 2, y);
        y += size * 2.2;
      }
      ctx.textAlign = 'left';
    }

    function draw() {
      ctx.save();
      if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

      // sky
      ctx.fillStyle = '#0d0221';
      ctx.fillRect(-10, -10, W + 20, H + 20);
      const t = performance.now() / 1000;
      for (const s of stars) {
        ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t + s.tw));
        ctx.fillStyle = '#e8e6f0';
        ctx.fillRect(s.x, s.y, s.r, s.r);
      }
      ctx.globalAlpha = 1;
      // moon
      ctx.fillStyle = '#ffe600';
      ctx.beginPath(); ctx.arc(W * 0.62, 70, 24, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0d0221';
      ctx.beginPath(); ctx.arc(W * 0.62 + 10, 62, 20, 0, Math.PI * 2); ctx.fill();

      // ground
      ctx.fillStyle = '#1a0f3d';
      ctx.fillRect(-10, GROUND, W + 20, H - GROUND + 10);
      ctx.strokeStyle = '#ff2e88';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-10, GROUND); ctx.lineTo(W + 10, GROUND); ctx.stroke();
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.25)';
      ctx.lineWidth = 1;
      for (let x = (t * 40) % 50 - 50; x < W + 20; x += 50) {
        ctx.beginPath(); ctx.moveTo(x, GROUND); ctx.lineTo(x - 30, H); ctx.stroke();
      }

      if (state !== 'title') {
        drawDragon();
        drawHero();
        for (const b of fireballs) drawFireball(b);
      }

      for (const p of particles) {
        ctx.globalAlpha = Math.min(1, p.life * 2);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
      }
      ctx.globalAlpha = 1;

      if (state !== 'title') drawHUD();

      if (state === 'title') {
        drawDragon();
        drawHero();
        centerText([
          ['JUMP', 42, '#ffe600'],
          ['A DRAGON BLOCKS YOUR PATH', 11, '#00f0ff'],
          ['DODGE 10 FIREBALLS TO SLAY IT', 11, '#00f0ff'],
        ], 150);
        if (Math.floor(t * 2) % 2 === 0) centerText([['TAP OR PRESS SPACE', 12, '#ff2e88']], 290);
      } else if (state === 'victory') {
        centerText([
          ['DRAGON SLAIN!', 26, '#ffe600'],
          ['LEVEL ' + level + ' CLEAR', 13, '#5cf042'],
        ], 150);
        if (stateTime > 1.5) centerText([['GET READY FOR LEVEL ' + (level + 1) + '...', 10, '#9b93b8']], 240);
      } else if (state === 'gameover') {
        ctx.fillStyle = 'rgba(13, 2, 33, 0.7)';
        ctx.fillRect(0, 0, W, H);
        centerText([
          ['GAME OVER', 30, '#ff2e88'],
          ['THE DRAGON GOT YOU', 11, '#9b93b8'],
          ['SCORE ' + totalScore + ' · LEVEL ' + level, 12, '#ffe600'],
        ], 160);
        if (stateTime > 0.8 && Math.floor(t * 2) % 2 === 0) centerText([['TAP TO TRY AGAIN', 12, '#00f0ff']], 310);
      }

      ctx.restore();
    }

    // ---------- main loop ----------
    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
