<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sharpeners — Flocade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0d0221;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 0.9rem;
      font-size: 0.6rem;
      border-bottom: 2px solid #2a1b4d;
      background: rgba(12, 4, 35, 0.95);
      z-index: 5;
    }
    a.back { color: #00f0ff; text-decoration: none; white-space: nowrap; }
    a.back:hover { text-shadow: 0 0 8px #00f0ff; }
    .hud { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .hud span strong { color: #ffe600; }
    #muteBtn {
      background: none;
      border: 2px solid #2a1b4d;
      border-radius: 6px;
      color: #e8e6f0;
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.25rem 0.45rem;
      cursor: pointer;
    }
    #muteBtn:hover { border-color: #ff2e88; }
    #stage { position: relative; flex: 1; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
    .helpline {
      position: absolute;
      left: 0; right: 0; bottom: 0.4rem;
      text-align: center;
      font-size: 0.5rem;
      color: #8a7fb0;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(13, 2, 33, 1);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../../">&larr; Flocade</a>
    <div class="hud">
      <span>COILS <strong id="coilCount">0</strong></span>
      <span>PENCILS <strong id="pencilCount">0</strong></span>
      <button id="muteBtn" title="Sound on/off">&#128266;</button>
    </div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div class="helpline">no winning &middot; no losing &middot; just sharpening</div>
  </div>

  <script>
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const coilCountEl = document.getElementById('coilCount');
  const pencilCountEl = document.getElementById('pencilCount');
  const muteBtn = document.getElementById('muteBtn');

  let W = 0, H = 0, S = 1, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth;
    H = stage.clientHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    S = Math.min(W / 900, H / 560);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- palette ----------
  const PENCIL_COLORS = ['#ff2e88', '#00f0ff', '#ffe600', '#7fff5e', '#ff8b2a', '#b388ff', '#ff5555', '#4dffc3'];
  const WOOD = '#e8c48f';
  const WOOD_DARK = '#c49a5f';

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, Math.min(255, (n >> 16) + amt));
    const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
    const b = Math.max(0, Math.min(255, (n & 255) + amt));
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }
  function randColor() { return PENCIL_COLORS[Math.floor(Math.random() * PENCIL_COLORS.length)]; }

  // ---------- sound ----------
  let audio = null;
  let muted = false;
  function ensureAudio() {
    if (muted) return null;
    if (!audio) {
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    }
    if (audio.state === 'suspended') audio.resume();
    return audio;
  }
  function noiseBuffer(ac) {
    if (ac._noise) return ac._noise;
    const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    ac._noise = buf;
    return buf;
  }
  function sndCrank() {
    const ac = ensureAudio();
    if (!ac) return;
    const t = ac.currentTime;
    // woody grind: filtered noise
    const src = ac.createBufferSource();
    src.buffer = noiseBuffer(ac);
    src.playbackRate.value = 0.8 + Math.random() * 0.3;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1400 + Math.random() * 500, t);
    bp.frequency.exponentialRampToValueAtTime(700, t + 0.16);
    bp.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    src.connect(bp).connect(g).connect(ac.destination);
    src.start(t); src.stop(t + 0.2);
    // low ratchet
    const o = ac.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(95, t);
    o.frequency.exponentialRampToValueAtTime(55, t + 0.12);
    const og = ac.createGain();
    og.gain.setValueAtTime(0.05, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(og).connect(ac.destination);
    o.start(t); o.stop(t + 0.14);
  }
  function sndPop() {
    const ac = ensureAudio();
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(520, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.12);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t + 0.16);
  }
  function sndClick() {
    const ac = ensureAudio();
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(700, t);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t + 0.07);
  }
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.innerHTML = muted ? '&#128263;' : '&#128266;';
  });

  // ---------- game state ----------
  const START_LEN = 330;   // scene units
  const STUB_LEN = 100;
  const CRANK_SHRINK = 6;
  const COIL_GROW = 1.05;      // radians per crank
  const COIL_DETACH = Math.PI * 4.2;

  let pencil = null;           // { color, len, spin, slideIn }
  let coil = null;             // attached: { t, color, wobble }
  let shavings = [];           // falling + landed coils
  let specks = [];
  let cup = [];                // tray pencils: { color, sway }
  let crankAnim = 0;           // 0..1, decays; drives spin + handle
  let crankAngle = 0;
  let idleTime = 0;
  let coilsDone = 0;
  let pencilsDone = 0;
  let holdTimer = null;
  let time = 0;

  for (let i = 0; i < 6; i++) cup.push({ color: randColor(), sway: Math.random() * Math.PI * 2 });

  // ---------- layout helpers (computed each frame) ----------
  function layout() {
    const axisY = H * 0.40;
    const sharpX = Math.min(W * 0.74, W - 130 * S);
    return {
      axisY,
      sharpX,
      sharpW: 170 * S,
      sharpH: 130 * S,
      groundY: H - 26,
      cupX: Math.max(90 * S, W * 0.13),
      cupY: H - 30
    };
  }

  // ---------- drawing ----------
  function drawBackground(L) {
    ctx.fillStyle = '#0d0221';
    ctx.fillRect(0, 0, W, H);
    // soft glows
    let g = ctx.createRadialGradient(W * 0.75, H * 0.35, 0, W * 0.75, H * 0.35, W * 0.5);
    g.addColorStop(0, 'rgba(0,240,255,0.06)');
    g.addColorStop(1, 'rgba(0,240,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    g = ctx.createRadialGradient(W * 0.2, H * 0.8, 0, W * 0.2, H * 0.8, W * 0.5);
    g.addColorStop(0, 'rgba(255,46,136,0.05)');
    g.addColorStop(1, 'rgba(255,46,136,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // desk line
    ctx.strokeStyle = '#2a1b4d';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, L.groundY);
    ctx.lineTo(W, L.groundY);
    ctx.stroke();
  }

  function drawPencilBody(x, y, len, color, spin, tip) {
    // horizontal pencil, right end at x (tip end), centered on y
    const r = 13 * S; // half thickness
    const left = x - len * S;
    const tipLen = tip ? 34 * S : 0;
    const bodyRight = x - tipLen;

    // three lengthwise faces cycling with spin for a rolling look
    const phase = Math.floor(spin / (Math.PI / 3)) % 3;
    const shades = [26, 0, -30];
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = shade(color, shades[(i + phase) % 3]);
      const fy = y - r + (i * 2 * r) / 3;
      ctx.fillRect(left + 30 * S, fy, bodyRight - left - 30 * S, (2 * r) / 3 + 0.5);
    }
    // outline
    ctx.strokeStyle = 'rgba(13,2,33,0.8)';
    ctx.lineWidth = 2;
    ctx.strokeRect(left + 30 * S, y - r, bodyRight - left - 30 * S, 2 * r);

    if (tip) {
      // wood cone
      ctx.fillStyle = WOOD;
      ctx.beginPath();
      ctx.moveTo(bodyRight, y - r);
      ctx.lineTo(x - 10 * S, y - 3.5 * S);
      ctx.lineTo(x - 10 * S, y + 3.5 * S);
      ctx.lineTo(bodyRight, y + r);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = WOOD_DARK;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // coloured lead
      ctx.fillStyle = shade(color, -40);
      ctx.beginPath();
      ctx.moveTo(x - 10 * S, y - 3.5 * S);
      ctx.lineTo(x, y);
      ctx.lineTo(x - 10 * S, y + 3.5 * S);
      ctx.closePath();
      ctx.fill();
    }

    // ferrule + eraser at left end
    ctx.fillStyle = '#c0c0d8';
    ctx.fillRect(left + 12 * S, y - r, 18 * S, 2 * r);
    ctx.strokeStyle = 'rgba(13,2,33,0.7)';
    ctx.strokeRect(left + 12 * S, y - r, 18 * S, 2 * r);
    ctx.fillStyle = '#ff9ec4';
    ctx.beginPath();
    ctx.moveTo(left + 12 * S, y - r);
    ctx.lineTo(left + 12 * S, y + r);
    ctx.lineTo(left + 2 * S, y + r * 0.75);
    ctx.arc(left + 2 * S, y, r * 0.75, Math.PI / 2, -Math.PI / 2);
    ctx.closePath();
    ctx.fill();
  }

  function drawSharpener(L) {
    const x = L.sharpX, y = L.axisY;
    const w = L.sharpW, h = L.sharpH;
    const top = y - h / 2;

    // body
    ctx.fillStyle = '#1a0f38';
    roundRect(x, top, w, h, 12 * S);
    ctx.fill();
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(0,240,255,0.25)';
    ctx.lineWidth = 8;
    ctx.stroke();

    // face plate
    ctx.fillStyle = '#241653';
    roundRect(x + 12 * S, top + 12 * S, w - 24 * S, h - 24 * S, 8 * S);
    ctx.fill();

    // label
    ctx.fillStyle = '#ffe600';
    ctx.font = (9 * S) + 'px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SHARP-O', x + w / 2, top + h - 30 * S);
    ctx.fillText('TRON', x + w / 2, top + h - 16 * S);

    // entry hole ring on left face
    ctx.fillStyle = '#0d0221';
    ctx.beginPath();
    ctx.ellipse(x, y, 10 * S, 20 * S, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff2e88';
    ctx.lineWidth = 3;
    ctx.stroke();

    // top slot (where the coil comes out)
    ctx.fillStyle = '#0d0221';
    ctx.fillRect(x + w * 0.28, top - 3, w * 0.34, 6);
    ctx.strokeStyle = '#ffe600';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + w * 0.28, top - 3, w * 0.34, 6);

    // crank handle on the right
    const cx = x + w + 6 * S, cy = y;
    ctx.strokeStyle = '#8a7fb0';
    ctx.lineWidth = 5 * S;
    ctx.beginPath();
    const hx = cx + Math.cos(crankAngle) * 26 * S;
    const hy = cy + Math.sin(crankAngle) * 26 * S;
    ctx.moveTo(cx, cy);
    ctx.lineTo(hx, hy);
    ctx.stroke();
    ctx.fillStyle = '#ff2e88';
    ctx.beginPath();
    ctx.arc(hx, hy, 8 * S, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c0c0d8';
    ctx.beginPath();
    ctx.arc(cx, cy, 6 * S, 0, Math.PI * 2);
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function coilPath(t, wobblePhase) {
    // Archimedean spiral points, scalloped edge
    const pts = [];
    for (let a = 0; a <= t; a += 0.12) {
      const r = (5 + 2.6 * a + 1.6 * Math.sin(a * 7 + wobblePhase)) * S;
      pts.push([Math.cos(a) * r, Math.sin(a) * r]);
    }
    return pts;
  }

  function drawCoil(x, y, t, color, rot, wobblePhase, alpha) {
    if (t < 0.3) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;
    const pts = coilPath(t, wobblePhase);
    // wood ribbon
    ctx.strokeStyle = WOOD;
    ctx.lineWidth = 7.5 * S;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    pts.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
    ctx.stroke();
    // painted rim (outer edge keeps the pencil's colour)
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5 * S;
    ctx.beginPath();
    pts.forEach((p, i) => {
      const d = Math.hypot(p[0], p[1]) || 1;
      const ox = p[0] + (p[0] / d) * 3.5 * S;
      const oy = p[1] + (p[1] / d) * 3.5 * S;
      i ? ctx.lineTo(ox, oy) : ctx.moveTo(ox, oy);
    });
    ctx.stroke();
    ctx.restore();
  }

  function drawCup(L) {
    const cw = 130 * S, ch = 90 * S;
    const x = L.cupX - cw / 2, y = L.cupY - ch;
    // pencils poking out
    cup.forEach((p, i) => {
      const px = x + cw * (0.14 + i * 0.145);
      const lean = Math.sin(p.sway + time * 0.8) * 0.04 + (i - 2.5) * 0.06;
      const plen = 120 * S;
      ctx.save();
      ctx.translate(px, y + 10 * S);
      ctx.rotate(lean);
      ctx.fillStyle = p.color;
      ctx.fillRect(-6 * S, -plen, 12 * S, plen);
      ctx.strokeStyle = 'rgba(13,2,33,0.8)';
      ctx.lineWidth = 2;
      ctx.strokeRect(-6 * S, -plen, 12 * S, plen);
      // flat unsharpened top
      ctx.fillStyle = shade(p.color, -35);
      ctx.fillRect(-6 * S, -plen, 12 * S, 6 * S);
      ctx.restore();
      p._hit = { x: px - 16 * S, y: y - plen, w: 32 * S, h: plen + ch };
    });
    // cup in front
    ctx.fillStyle = '#1a0f38';
    roundRect(x, y, cw, ch, 8 * S);
    ctx.fill();
    ctx.strokeStyle = '#ff2e88';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#00f0ff';
    ctx.font = (8 * S) + 'px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PENCILS', x + cw / 2, y + ch / 2 + 4 * S);
  }

  function drawHint(L) {
    const pulse = 0.6 + 0.4 * Math.sin(time * 5);
    ctx.font = (11 * S) + 'px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    if (!pencil) {
      ctx.fillStyle = 'rgba(255,230,0,' + pulse + ')';
      ctx.fillText('TAP A PENCIL!', L.cupX, L.cupY - 160 * S);
    } else if (idleTime > 1.6 && pencil.slideIn <= 0) {
      const left = L.sharpX - pencil.len * S;
      ctx.fillStyle = 'rgba(255,230,0,' + pulse + ')';
      ctx.fillText('TAP THE END!', left + 10 * S, L.axisY - 50 * S);
      // arrow
      ctx.strokeStyle = 'rgba(255,230,0,' + pulse + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(left + 10 * S, L.axisY - 40 * S);
      ctx.lineTo(left + 4 * S, L.axisY - 18 * S);
      ctx.stroke();
    }
  }

  // ---------- actions ----------
  function loadPencil(i) {
    if (pencil) return;
    pencil = { color: cup[i].color, len: START_LEN, spin: 0, slideIn: 1 };
    cup[i] = { color: randColor(), sway: Math.random() * Math.PI * 2 };
    sndClick();
    idleTime = 0;
  }

  function crank() {
    if (!pencil || pencil.slideIn > 0) return;
    pencil.len -= CRANK_SHRINK;
    pencil.spin += Math.PI / 3;
    crankAnim = 1;
    crankAngle += Math.PI * 0.7;
    if (!coil) coil = { t: 0, color: pencil.color, wobble: Math.random() * Math.PI * 2 };
    coil.t += COIL_GROW;
    sndCrank();
    spawnSpecks();
    idleTime = 0;
    if (coil.t >= COIL_DETACH) detachCoil();
    if (pencil.len <= STUB_LEN) finishPencil();
  }

  function detachCoil() {
    if (!coil) return;
    const L = layout();
    shavings.push({
      x: L.sharpX + L.sharpW * 0.45,
      y: L.axisY - L.sharpH / 2 - 20 * S,
      vx: (Math.random() - 0.3) * 60,
      vy: -40 - Math.random() * 40,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 4,
      t: coil.t,
      color: coil.color,
      wobble: coil.wobble,
      landed: false,
      flut: Math.random() * Math.PI * 2
    });
    if (shavings.length > 70) shavings.shift();
    coil = null;
    coilsDone++;
    coilCountEl.textContent = coilsDone;
    sndPop();
  }

  function finishPencil() {
    if (coil && coil.t > 1) detachCoil();
    coil = null;
    // stub gets ejected onto the pile
    const L = layout();
    shavings.push({
      x: L.sharpX - 40 * S,
      y: L.axisY,
      vx: -80 - Math.random() * 60,
      vy: -120,
      rot: 0,
      vr: (Math.random() - 0.5) * 6,
      stub: true,
      len: STUB_LEN,
      color: pencil.color,
      landed: false,
      flut: 0
    });
    pencil = null;
    pencilsDone++;
    pencilCountEl.textContent = pencilsDone;
    sndPop();
    stopHold();
  }

  function spawnSpecks() {
    const L = layout();
    for (let i = 0; i < 5; i++) {
      specks.push({
        x: L.sharpX + Math.random() * L.sharpW * 0.6 + 10 * S,
        y: L.axisY + L.sharpH / 2,
        vx: (Math.random() - 0.5) * 50,
        vy: 40 + Math.random() * 80,
        life: 1,
        color: Math.random() < 0.6 ? WOOD : pencil.color
      });
    }
  }

  // ---------- input ----------
  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }

  function hitTest(pos) {
    const L = layout();
    if (pencil && pencil.slideIn <= 0) {
      // generous circle around the eraser end
      const left = L.sharpX - pencil.len * S;
      if (Math.hypot(pos.x - left, pos.y - L.axisY) < 65 * S) return { type: 'end' };
      // tapping anywhere on the pencil also cranks (phones!)
      if (pos.x > left - 20 && pos.x < L.sharpX && Math.abs(pos.y - L.axisY) < 30 * S) return { type: 'end' };
    }
    for (let i = 0; i < cup.length; i++) {
      const h = cup[i]._hit;
      if (h && pos.x > h.x && pos.x < h.x + h.w && pos.y > h.y && pos.y < h.y + h.h) return { type: 'cup', i };
    }
    return null;
  }

  function startHold() {
    stopHold();
    holdTimer = setInterval(crank, 230);
  }
  function stopHold() {
    if (holdTimer) { clearInterval(holdTimer); holdTimer = null; }
  }

  function onDown(e) {
    e.preventDefault();
    ensureAudio();
    const hit = hitTest(pointerPos(e));
    if (!hit) return;
    if (hit.type === 'cup') {
      if (!pencil) loadPencil(hit.i);
    } else if (hit.type === 'end') {
      crank();
      startHold();
    }
  }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('mouseup', stopHold);
  window.addEventListener('touchend', stopHold);
  window.addEventListener('touchcancel', stopHold);

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (e.repeat) return;
      ensureAudio();
      if (!pencil) loadPencil(Math.floor(Math.random() * cup.length));
      else if (pencil.slideIn <= 0) { crank(); startHold(); }
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') stopHold();
  });

  // ---------- main loop ----------
  let lastTs = 0;
  function frame(ts) {
    const dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    time += dt;
    idleTime += dt;
    crankAnim = Math.max(0, crankAnim - dt * 3);

    const L = layout();
    drawBackground(L);

    // landed shavings first (behind everything on the desk)
    shavings.forEach(sh => {
      if (!sh.landed) {
        sh.flut += dt * 6;
        sh.vy += 240 * dt;              // gravity
        sh.vy = Math.min(sh.vy, sh.stub ? 500 : 130);  // coils flutter down slowly
        sh.x += (sh.vx + (sh.stub ? 0 : Math.sin(sh.flut) * 40)) * dt;
        sh.y += sh.vy * dt;
        sh.rot += sh.vr * dt;
        sh.vx *= 0.99;
        const restY = L.groundY - (sh.stub ? 10 * S : (6 + 2.6 * sh.t) * S * 0.7);
        if (sh.y >= restY) {
          sh.y = restY;
          sh.landed = true;
          sh.x = Math.max(20, Math.min(W - 20, sh.x));
        }
      }
      if (sh.stub) {
        ctx.save();
        ctx.translate(sh.x, sh.y);
        ctx.rotate(sh.rot);
        drawPencilBody(sh.len * S * 0.5, 0, sh.len, sh.color, 0, true);
        ctx.restore();
      } else {
        ctx.save();
        if (sh.landed) { ctx.translate(sh.x, sh.y); ctx.scale(1, 0.8); ctx.translate(-sh.x, -sh.y); }
        drawCoil(sh.x, sh.y, sh.t, sh.color, sh.rot, sh.wobble, sh.landed ? 0.9 : 1);
        ctx.restore();
      }
    });

    // specks
    specks = specks.filter(sp => sp.life > 0);
    specks.forEach(sp => {
      sp.x += sp.vx * dt;
      sp.y += sp.vy * dt;
      sp.vy += 300 * dt;
      sp.life -= dt * 1.4;
      if (sp.y > L.groundY) sp.life = 0;
      ctx.globalAlpha = Math.max(sp.life, 0);
      ctx.fillStyle = sp.color;
      ctx.fillRect(sp.x, sp.y, 3 * S, 3 * S);
      ctx.globalAlpha = 1;
    });

    // pencil (slides in from the left when loaded)
    if (pencil) {
      if (pencil.slideIn > 0) pencil.slideIn = Math.max(0, pencil.slideIn - dt * 2.5);
      const slide = pencil.slideIn * pencil.slideIn * W * 0.6;
      const wobbleY = crankAnim > 0 ? Math.sin(time * 60) * 1.5 * crankAnim : 0;
      drawPencilBody(L.sharpX + 16 * S - slide, L.axisY + wobbleY, pencil.len, pencil.color, pencil.spin, true);
    }

    drawSharpener(L);

    // attached, growing coil above the slot
    if (coil) {
      const cx = L.sharpX + L.sharpW * 0.45;
      const cy = L.axisY - L.sharpH / 2 - (8 + 2.6 * coil.t * 0.5) * S;
      drawCoil(cx, cy, coil.t, coil.color, time * 0.4, coil.wobble, 1);
    }

    drawCup(L);
    drawHint(L);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  </script>
</body>
</html>
