<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My World — Flocade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ff7eb6;
      --pink-deep: #ff2e88;
      --cyan: #7ee8fa;
      --yellow: #ffe600;
      --text: #4a2e52;
      --cream: #fff5fb;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #cdeffd;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas { position: fixed; inset: 0; display: block; }

    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    #ui > * { pointer-events: auto; }

    a.back {
      position: fixed; top: 12px; left: 12px;
      color: #fff; font-family: 'Press Start 2P', monospace; font-size: 0.65rem;
      text-decoration: none; text-shadow: 2px 2px 0 var(--pink-deep);
    }

    /* joystick */
    #joy {
      position: fixed; left: 18px; bottom: 18px;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255, 245, 251, 0.35);
      border: 3px solid rgba(255, 255, 255, 0.7);
      touch-action: none;
    }
    #joy .thumb {
      position: absolute; left: 50%; top: 50%;
      width: 56px; height: 56px; margin: -28px 0 0 -28px;
      border-radius: 50%;
      background: rgba(255, 126, 182, 0.85);
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* small round toggle buttons */
    .toggle {
      position: fixed; right: 14px;
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255, 245, 251, 0.9);
      border: 3px solid var(--pink);
      font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .toggle.off { opacity: 0.5; }
    #gyroBtn { bottom: 90px; }
    #muteBtn { bottom: 24px; }

    /* modal screens */
    .modal {
      position: fixed; inset: 0; z-index: 10;
      background: rgba(74, 46, 82, 0.5);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--cream);
      border: 4px solid var(--pink);
      border-radius: 24px;
      padding: 1.5rem;
      max-width: 380px; width: 100%;
      text-align: center;
      box-shadow: 0 10px 0 rgba(255, 46, 136, 0.25);
    }
    .card p { color: var(--text); font-size: 1.05rem; line-height: 1.6; margin-bottom: 1rem; }
    .card .btn {
      background: var(--pink-deep); color: #fff; border: none;
      border-radius: 999px; font-weight: 700; font-size: 1rem;
      padding: 0.8rem 1.4rem; cursor: pointer; margin: 0.25rem;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .card .btn:active { transform: translateY(3px); box-shadow: none; }

    #intro h1 { font-family: 'Press Start 2P', monospace; color: var(--pink-deep); font-size: 1.5rem; line-height: 1.6; margin-bottom: 0.5rem; }
    .controls-help { color: var(--text); font-size: 0.9rem; line-height: 1.8; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="../../">&larr; FLOCADE</a>
    <div id="joy"><div class="thumb"></div></div>
    <button class="toggle off" id="gyroBtn" title="Tilt to look">🔄</button>
    <button class="toggle" id="muteBtn" title="Music">🔊</button>
  </div>
  <div id="screen"></div>

  <script type="module">
    import * as THREE from './three.module.min.js';

    // ============================================================
    // Three.js setup
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcdeffd);
    scene.fog = new THREE.Fog(0xcdeffd, 40, 85);

    const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 200);

    scene.add(new THREE.HemisphereLight(0xffffff, 0xffd6ec, 1.05));
    const sun = new THREE.DirectionalLight(0xfff4e0, 0.8);
    sun.position.set(12, 25, 8);
    scene.add(sun);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    const obstacles = []; // circles {x, z, r}
    const boxes = [];     // AABBs {minX, maxX, minZ, maxZ}
    const mat = (color, rough = 0.85) => new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: 0 });

    function addBoxObstacle(cx, cz, halfX, halfZ) {
      boxes.push({ minX: cx - halfX, maxX: cx + halfX, minZ: cz - halfZ, maxZ: cz + halfZ });
    }

    // ---- Canvas sign / emoji sprite helpers ----
    function roundRect(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }
    const emojiTexCache = {};
    function emojiTexture(e) {
      if (emojiTexCache[e]) return emojiTexCache[e];
      const cv = document.createElement('canvas');
      cv.width = cv.height = 128;
      const c = cv.getContext('2d');
      c.font = '100px serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(e, 64, 70);
      const t = new THREE.CanvasTexture(cv);
      emojiTexCache[e] = t;
      return t;
    }
    const itemGeo = new THREE.PlaneGeometry(1, 1);
    function itemSprite(e, size = 0.6) {
      const m = new THREE.Mesh(itemGeo, new THREE.MeshBasicMaterial({ map: emojiTexture(e), transparent: true, side: THREE.DoubleSide }));
      m.scale.setScalar(size);
      return m;
    }
    function textSign(emoji, label, w = 2.4, h = 2.4) {
      const cv = document.createElement('canvas');
      cv.width = cv.height = 256;
      const c = cv.getContext('2d');
      c.fillStyle = '#fff5fb';
      c.strokeStyle = '#ff7eb6'; c.lineWidth = 14;
      roundRect(c, 12, 12, 232, 232, 36); c.fill(); c.stroke();
      c.font = '110px serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(emoji, 128, 105);
      c.fillStyle = '#ff2e88'; c.font = 'bold 42px Inter, sans-serif';
      c.fillText(label, 128, 202);
      const tex = new THREE.CanvasTexture(cv);
      return new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
    }

    // ---- Ground ----
    const ground = new THREE.Mesh(new THREE.CircleGeometry(60, 48), mat(0xb6e8a0));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // soft path from park to mall
    const path = new THREE.Mesh(new THREE.PlaneGeometry(5, 70), mat(0xf3e2c7));
    path.rotation.x = -Math.PI / 2;
    path.position.y = 0.02;
    scene.add(path);

    // plaza disc
    const plaza = new THREE.Mesh(new THREE.CircleGeometry(7, 40), mat(0xffe3f1));
    plaza.rotation.x = -Math.PI / 2;
    plaza.position.y = 0.03;
    scene.add(plaza);

    // ---- Fountain (centre) ----
    (function fountain() {
      const g = new THREE.Group();
      const base = new THREE.Mesh(new THREE.CylinderGeometry(2.1, 2.3, 0.6, 24), mat(0xffd6ec));
      base.position.y = 0.3;
      const water = new THREE.Mesh(new THREE.CylinderGeometry(1.7, 1.7, 0.62, 24), mat(0x9fe0ff, 0.4));
      water.position.y = 0.34;
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 1.2, 16), mat(0xffffff));
      stem.position.y = 1.1;
      const top = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), mat(0x9fe0ff, 0.4));
      top.position.y = 1.9;
      g.add(base, water, stem, top);
      scene.add(g);
      obstacles.push({ x: 0, z: 0, r: 2.4 });
    })();

    // ---- Trees & flowers (park, -z) ----
    function tree(x, z, scale = 1) {
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.6, 10), mat(0xb98b5e));
      trunk.position.y = 0.8;
      const leafColor = [0x8fd96b, 0xa7e88a, 0x7fd0a0][Math.floor(Math.random() * 3)];
      for (let i = 0; i < 3; i++) {
        const blob = new THREE.Mesh(new THREE.SphereGeometry(1 - i * 0.18, 14, 12), mat(leafColor));
        blob.position.set((Math.random() - 0.5) * 0.5, 1.8 + i * 0.55, (Math.random() - 0.5) * 0.5);
        g.add(blob);
      }
      g.add(trunk);
      g.position.set(x, 0, z);
      g.scale.setScalar(scale);
      scene.add(g);
      obstacles.push({ x, z, r: 0.6 * scale });
    }
    function flower(x, z) {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5, 6), mat(0x6cc24a));
      stem.position.y = 0.25;
      const petalColor = [0xff7eb6, 0xffe600, 0xffffff, 0xb38bff, 0xff9e57][Math.floor(Math.random() * 5)];
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), mat(petalColor));
      head.position.y = 0.55;
      const centre = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), mat(0xffe600));
      centre.position.y = 0.62;
      g.add(stem, head, centre);
      g.position.set(x, 0, z);
      scene.add(g);
    }
    const treePositions = [[-12,-10],[-18,-16],[-22,-24],[-8,-22],[-14,-30],[10,-12],[15,-22],[20,-16],[8,-30],[18,-28],[-25,-8],[24,-8],[-20,-32],[22,-32]];
    treePositions.forEach(([x, z], i) => tree(x, z, 0.8 + (i % 3) * 0.15));
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2, d = 6 + Math.random() * 26;
      const x = Math.sin(a) * d, z = -8 - Math.random() * 24;
      if (Math.abs(x) > 3.2) flower(x, z);
    }

    // ---- Pond ----
    (function pond() {
      const p = new THREE.Mesh(new THREE.CircleGeometry(4, 32), mat(0x8fd6ff, 0.3));
      p.rotation.x = -Math.PI / 2;
      p.position.set(-14, 0.04, -20);
      scene.add(p);
      const rim = new THREE.Mesh(new THREE.TorusGeometry(4, 0.25, 10, 36), mat(0xe8c98f));
      rim.rotation.x = -Math.PI / 2;
      rim.position.set(-14, 0.1, -20);
      scene.add(rim);
      obstacles.push({ x: -14, z: -20, r: 4.3 });
    })();

    // ============================================================
    // The mall — a proper building with walls, big shops, stocked shelves
    // Footprint: x -20..20, z 12..44. Entrance gap on the front (z=12).
    // ============================================================
    const WALL_H = 5;

    function wallBox(cx, cz, sx, sz, h = WALL_H, color = 0xffd6ec, solid = true, cy) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(sx, h, sz), mat(color));
      m.position.set(cx, cy ?? h / 2, cz);
      scene.add(m);
      if (solid) addBoxObstacle(cx, cz, sx / 2, sz / 2);
      return m;
    }

    (function mallBuilding() {
      // floor + corridor carpet
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 32), mat(0xfff6ec));
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(0, 0.06, 28);
      scene.add(floor);
      const carpet = new THREE.Mesh(new THREE.PlaneGeometry(8, 31), mat(0xffe3f1));
      carpet.rotation.x = -Math.PI / 2;
      carpet.position.set(0, 0.07, 28);
      scene.add(carpet);

      // outer walls (front has an entrance gap x -4..4)
      wallBox(-12, 12, 16, 0.6);           // front left
      wallBox(12, 12, 16, 0.6);            // front right
      wallBox(0, 12, 8.6, 0.6, 1.6, 0xffd6ec, false, WALL_H - 0.8); // header above entrance
      wallBox(0, 44, 40.6, 0.6);           // back
      wallBox(-20, 28, 0.6, 32);           // west
      wallBox(20, 28, 0.6, 32);            // east

      // shop divider walls (lower, so the mall feels open inside)
      for (const z of [23, 33]) {
        wallBox(-12.5, z, 15, 0.5, 3.6, 0xffe9f4);
        wallBox(12.5, z, 15, 0.5, 3.6, 0xffe9f4);
      }

      // roof
      const roof = new THREE.Mesh(new THREE.BoxGeometry(42, 0.6, 34), mat(0xff9ec7));
      roof.position.set(0, WALL_H + 0.3, 28);
      scene.add(roof);

      // big MALL sign over the entrance
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 128;
      const c = cv.getContext('2d');
      c.fillStyle = '#fff5fb'; c.strokeStyle = '#ff7eb6'; c.lineWidth = 10;
      roundRect(c, 6, 6, 500, 116, 30); c.fill(); c.stroke();
      c.fillStyle = '#ff2e88'; c.font = 'bold 72px Inter, sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('🛍️ THE MALL 🛍️', 256, 68);
      const sign = new THREE.Mesh(new THREE.PlaneGeometry(8, 2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
      sign.position.set(0, WALL_H + 1.5, 11.7);
      sign.rotation.y = Math.PI;
      scene.add(sign);

      // ceiling lights down the corridor
      for (const z of [16.5, 22.5, 28.5, 34.5, 40.5]) {
        const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.8, 6), mat(0x4a2e52));
        cord.position.set(0, WALL_H - 0.4, z);
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 10), new THREE.MeshBasicMaterial({ color: 0xfff6c8 }));
        bulb.position.set(0, WALL_H - 0.85, z);
        scene.add(cord, bulb);
      }

      // benches + potted plants in the corridor
      function bench(x, z) {
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.12, 2.2), mat(0xb98b5e));
        seat.position.set(x, 0.5, z);
        for (const dz of [-0.9, 0.9]) {
          const leg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.15), mat(0x9a6f45));
          leg.position.set(x, 0.25, z + dz);
          scene.add(leg);
        }
        scene.add(seat);
        addBoxObstacle(x, z, 0.5, 1.3);
      }
      bench(-3.9, 25.5); bench(3.9, 30.5);
      function plant(x, z) {
        const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.28, 0.5, 12), mat(0xff9e57));
        pot.position.set(x, 0.25, z);
        const bush = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 10), mat(0x7fd0a0));
        bush.position.set(x, 0.85, z);
        scene.add(pot, bush);
        obstacles.push({ x, z, r: 0.55 });
      }
      plant(-3.9, 14); plant(3.9, 14); plant(-3.9, 42); plant(3.9, 42);
    })();

    // ---- Shops: big rooms with shelves full of things ----
    // West shops span x -20..-5, east shops x 5..20; corridor is x -5..5.
    const SHOP_LIST = [
      { side: -1, cz: 17.5, zMin: 12.3, zMax: 22.75, name: 'Scoops',   emoji: '🍦', items: ['🍦','🍨','🍧','🍫','🧁','🍪','🍭','🥤'] },
      { side: -1, cz: 28,   zMin: 23.25, zMax: 32.75, name: 'Toy Box', emoji: '🧸', items: ['🧸','🤖','🪀','🚂','🦄','⚽','🎲','🪁'] },
      { side: -1, cz: 38.5, zMin: 33.25, zMax: 43.7,  name: 'Bakery',  emoji: '🥐', items: ['🥐','🍞','🥖','🎂','🍩','🧁','🥨','🍪'] },
      { side: 1,  cz: 17.5, zMin: 12.3, zMax: 22.75,  name: 'Boutique',emoji: '👗', items: ['👗','👕','👖','🧥','👟','👒','🧣','🎒'] },
      { side: 1,  cz: 28,   zMin: 23.25, zMax: 32.75, name: 'Market',  emoji: '🛒', items: ['🍎','🍌','🥕','🥛','🧃','🥫','🍉','🥚'] },
      { side: 1,  cz: 38.5, zMin: 33.25, zMax: 43.7,  name: 'Books',   emoji: '📚', items: ['📕','📗','📘','📙','🧩','🎮','✏️','🎨'] },
    ];

    // A shelf unit: back panel + 3 boards, each stocked with items. Faces +z before rotation.
    function shelfUnit(items, offset) {
      const g = new THREE.Group();
      const back = new THREE.Mesh(new THREE.BoxGeometry(4.4, 3.1, 0.14), mat(0xffe0f0));
      back.position.y = 1.55;
      g.add(back);
      [0.55, 1.35, 2.15].forEach((y, row) => {
        const board = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.09, 0.7), mat(0xffffff));
        board.position.set(0, y, 0.38);
        g.add(board);
        for (let i = 0; i < 4; i++) {
          const it = itemSprite(items[(row * 4 + i + offset) % items.length]);
          it.position.set(-1.5 + i, y + 0.42, 0.42);
          g.add(it);
        }
      });
      return g;
    }

    function placeShelf(x, z, ry, items, offset) {
      const u = shelfUnit(items, offset);
      u.position.set(x, 0, z);
      u.rotation.y = ry;
      scene.add(u);
      // AABB: 4.4 long, ~1 deep, oriented by ry
      const along = Math.abs(Math.sin(ry)) > 0.5; // true → long axis runs along z
      addBoxObstacle(x, z, along ? 0.6 : 2.2, along ? 2.2 : 0.6);
    }

    SHOP_LIST.forEach((s, si) => {
      const backX = s.side * 18.9;                 // against the outer wall
      const backRy = s.side === -1 ? Math.PI / 2 : -Math.PI / 2;
      placeShelf(backX, s.cz - 2.6, backRy, s.items, 0);
      placeShelf(backX, s.cz + 2.6, backRy, s.items, 2);
      // shelves along the divider / front-back walls
      const sideX = s.side * 12.5;
      placeShelf(sideX, s.zMin + 0.75, 0, s.items, 1);
      placeShelf(sideX, s.zMax - 0.75, Math.PI, s.items, 3);

      // counter near the shopfront with a till and a couple of goodies
      const counterX = s.side * 7.8;
      const counter = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.95, 3.4), mat(0xffd6ec));
      counter.position.set(counterX, 0.475, s.cz);
      const counterTop = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 3.7), mat(0xffffff));
      counterTop.position.set(counterX, 0.98, s.cz);
      scene.add(counter, counterTop);
      addBoxObstacle(counterX, s.cz, 0.75, 1.85);
      const till = itemSprite('🧾', 0.5);
      till.position.set(counterX, 1.3, s.cz - 1);
      till.rotation.y = s.side === -1 ? Math.PI / 2 : -Math.PI / 2;
      const treat = itemSprite(s.items[0], 0.55);
      treat.position.set(counterX, 1.32, s.cz + 0.8);
      treat.rotation.y = till.rotation.y;
      scene.add(till, treat);

      // hanging shop sign facing the corridor
      const sign = textSign(s.emoji, s.name);
      sign.position.set(s.side * 5.4, 3.4, s.cz);
      sign.rotation.y = s.side === -1 ? Math.PI / 2 : -Math.PI / 2;
      scene.add(sign);
    });

    // ---- Directional signposts in plaza ----
    function signpost(text, x, z, ry) {
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 128;
      const c = cv.getContext('2d');
      c.fillStyle = '#fff5fb'; c.strokeStyle = '#ff7eb6'; c.lineWidth = 10;
      roundRect(c, 6, 6, 244, 116, 24); c.fill(); c.stroke();
      c.fillStyle = '#ff2e88'; c.font = 'bold 56px Inter, sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(text, 128, 66);
      const tex = new THREE.CanvasTexture(cv);
      const board = new THREE.Mesh(new THREE.PlaneGeometry(2, 1), new THREE.MeshBasicMaterial({ map: tex }));
      board.position.set(x, 2, z); board.rotation.y = ry;
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2, 8), mat(0xb98b5e));
      post.position.set(x, 0.75, z);
      scene.add(board, post);
    }
    signpost('🌳 PARK', -4, -5, 0);
    signpost('🛍️ MALL', 4, 9, Math.PI);

    // ============================================================
    // Toca-style people
    // ============================================================
    const white = mat(0xffffff), dark = mat(0x4a2e52, 0.5), blush = mat(0xff9ec7);

    function makeHuman(p) {
      const g = new THREE.Group();
      const skin = mat(p.skin), topM = mat(p.top), botM = mat(p.bottom), hairM = mat(p.hairColor);
      // legs + shoes
      for (const sx of [-0.13, 0.13]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.42, 10), botM);
        leg.position.set(sx, 0.21, 0);
        const shoe = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), white);
        shoe.scale.set(1, 0.55, 1.4);
        shoe.position.set(sx, 0.06, 0.05);
        g.add(leg, shoe);
      }
      // torso
      const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.24, 0.3, 6, 14), topM);
      torso.position.y = 0.72;
      g.add(torso);
      // arms + hands
      for (const sx of [-0.3, 0.3]) {
        const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.28, 4, 10), topM);
        arm.position.set(sx, 0.78, 0);
        arm.rotation.z = sx > 0 ? -0.18 : 0.18;
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), skin);
        hand.position.set(sx * 1.14, 0.56, 0);
        g.add(arm, hand);
      }
      // big friendly head (front = +z)
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 18, 16), skin);
      head.position.y = 1.32;
      g.add(head);
      for (const sx of [-0.11, 0.11]) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 8), dark);
        eye.position.set(sx, 1.36, 0.27);
        g.add(eye);
      }
      for (const sx of [-0.19, 0.19]) {
        const ch = new THREE.Mesh(new THREE.CircleGeometry(0.05, 10), blush);
        ch.position.set(sx, 1.28, 0.235);
        ch.rotation.y = sx > 0 ? -0.65 : 0.65;
        g.add(ch);
      }
      const smile = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.016, 6, 12, Math.PI), dark);
      smile.position.set(0, 1.27, 0.27);
      smile.rotation.z = Math.PI;
      g.add(smile);
      // hair styles
      if (p.hair === 'bob') {
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.33, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.62), hairM);
        cap.position.y = 1.34;
        const back = new THREE.Mesh(new THREE.SphereGeometry(0.31, 14, 10), hairM);
        back.scale.set(1, 1.15, 0.7);
        back.position.set(0, 1.26, -0.12);
        g.add(cap, back);
      } else if (p.hair === 'bun') {
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.55), hairM);
        cap.position.y = 1.36;
        const bun = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 8), hairM);
        bun.position.set(0, 1.68, -0.05);
        g.add(cap, bun);
      } else if (p.hair === 'spiky') {
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.31, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.45), hairM);
        cap.position.y = 1.36;
        g.add(cap);
        for (const [sx, sz] of [[-0.12, 0], [0, 0.05], [0.12, -0.03]]) {
          const spike = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.22, 8), hairM);
          spike.position.set(sx, 1.66, sz);
          g.add(spike);
        }
      } else if (p.hair === 'long') {
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.33, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.6), hairM);
        cap.position.y = 1.34;
        g.add(cap);
        for (const sx of [-0.24, 0.24]) {
          const lock = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.45, 4, 8), hairM);
          lock.position.set(sx, 1.05, -0.08);
          g.add(lock);
        }
      } else if (p.hair === 'cap') {
        const crown = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.5), hairM);
        crown.position.y = 1.37;
        const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.04, 12), hairM);
        brim.position.set(0, 1.45, 0.3);
        brim.scale.z = 1.4;
        g.add(crown, brim);
      }
      return g;
    }

    // wander regions
    const PARK = { minX: -24, maxX: 24, minZ: -30, maxZ: -6 };
    const CORRIDOR = { minX: -3.4, maxX: 3.4, minZ: 14, maxZ: 42 };

    const PEOPLE = [
      // park visitors
      { x: -8,  z: -12, region: PARK, hair: 'bob',   hairColor: 0xb85c38, skin: 0xf1c27d, top: 0xff7eb6, bottom: 0x4a6cff },
      { x: 10,  z: -16, region: PARK, hair: 'spiky', hairColor: 0x1f1f26, skin: 0x8d5524, top: 0x7ee8fa, bottom: 0x38406e },
      { x: 18,  z: -24, region: PARK, hair: 'bun',   hairColor: 0xf6d365, skin: 0xffdbc4, top: 0xffe600, bottom: 0x69d18c },
      { x: -4,  z: -27, region: PARK, hair: 'long',  hairColor: 0x3b2b20, skin: 0xe0ac69, top: 0xb38bff, bottom: 0xffffff },
      { x: 5,   z: -9,  region: PARK, hair: 'cap',   hairColor: 0xff5a5a, skin: 0xc68642, top: 0xffffff, bottom: 0x4a6cff },
      { x: -20, z: -12, region: PARK, hair: 'bob',   hairColor: 0xff7eb6, skin: 0xffdbc4, top: 0x69d18c, bottom: 0xffb347 },
      // mall shoppers strolling the corridor
      { x: 0,  z: 17, region: CORRIDOR, hair: 'long',  hairColor: 0x9b6bff, skin: 0xf1c27d, top: 0xff9e57, bottom: 0x4a2e52 },
      { x: 2,  z: 29, region: CORRIDOR, hair: 'spiky', hairColor: 0xb85c38, skin: 0x8d5524, top: 0xffe600, bottom: 0x38406e },
      { x: -2, z: 39, region: CORRIDOR, hair: 'bun',   hairColor: 0x1f1f26, skin: 0xe0ac69, top: 0x7ee8fa, bottom: 0xff7eb6 },
      { x: 1,  z: 23, region: CORRIDOR, hair: 'cap',   hairColor: 0x4a6cff, skin: 0xffdbc4, top: 0xb6e8a0, bottom: 0xffffff },
    ];

    // shopkeepers standing behind their counters
    const KEEPER_LOOKS = [
      { hair: 'bun',   hairColor: 0xff7eb6, skin: 0xe0ac69, top: 0xffffff, bottom: 0xff2e88 },
      { hair: 'spiky', hairColor: 0x3b2b20, skin: 0xffdbc4, top: 0xffe600, bottom: 0x4a6cff },
      { hair: 'bob',   hairColor: 0xf6d365, skin: 0x8d5524, top: 0xff9e57, bottom: 0x4a2e52 },
      { hair: 'long',  hairColor: 0x1f1f26, skin: 0xc68642, top: 0xb38bff, bottom: 0xffffff },
      { hair: 'cap',   hairColor: 0x69d18c, skin: 0xf1c27d, top: 0x7ee8fa, bottom: 0x38406e },
      { hair: 'bob',   hairColor: 0x9b6bff, skin: 0xffdbc4, top: 0xff7eb6, bottom: 0x69d18c },
    ];
    SHOP_LIST.forEach((s, i) => {
      PEOPLE.push({
        x: s.side * 9.3, z: s.cz,
        face: s.side === -1 ? Math.PI / 2 : -Math.PI / 2,
        ...KEEPER_LOOKS[i],
      });
    });

    const people = [];
    PEOPLE.forEach(p => {
      const g = makeHuman(p);
      g.position.set(p.x, 0, p.z);
      g.rotation.y = p.face ?? Math.random() * Math.PI * 2;
      scene.add(g);
      people.push({ data: p, group: g, baseX: p.x, baseZ: p.z, phase: Math.random() * 6.28, tx: p.x, tz: p.z, wt: Math.random() * 3, faceYaw: g.rotation.y });
    });

    function pickTarget(m) {
      const r = m.data.region;
      for (let i = 0; i < 6; i++) {
        const tx = Math.max(r.minX, Math.min(r.maxX, m.baseX + (Math.random() - 0.5) * 10));
        const tz = Math.max(r.minZ, Math.min(r.maxZ, m.baseZ + (Math.random() - 0.5) * 10));
        // keep park walkers out of the pond and off the fountain
        if (r === PARK && (Math.hypot(tx + 14, tz + 20) < 5.2 || Math.hypot(tx, tz) < 3)) continue;
        m.tx = tx; m.tz = tz;
        return;
      }
    }

    // ============================================================
    // Player + controls
    // ============================================================
    const player = { x: 0, z: 7, yaw: 0, pitch: 0 };
    const EYE = 1.5, RADIUS = 0.5, WORLD_R = 55;
    const move = { f: 0, s: 0 };

    function resolveCollisions(nx, nz) {
      for (const o of obstacles) {
        const dx = nx - o.x, dz = nz - o.z;
        const d = Math.hypot(dx, dz), min = o.r + RADIUS;
        if (d < min && d > 0.0001) {
          nx = o.x + (dx / d) * min;
          nz = o.z + (dz / d) * min;
        }
      }
      for (const b of boxes) {
        const cx = Math.max(b.minX, Math.min(nx, b.maxX));
        const cz = Math.max(b.minZ, Math.min(nz, b.maxZ));
        let dx = nx - cx, dz = nz - cz;
        const d2 = dx * dx + dz * dz;
        if (d2 < RADIUS * RADIUS) {
          if (d2 > 1e-8) {
            const d = Math.sqrt(d2);
            nx = cx + (dx / d) * RADIUS;
            nz = cz + (dz / d) * RADIUS;
          } else {
            // centre is inside the box — push out through the nearest face
            const pushes = [
              { d: nx - b.minX, x: b.minX - RADIUS, z: nz },
              { d: b.maxX - nx, x: b.maxX + RADIUS, z: nz },
              { d: nz - b.minZ, x: nx, z: b.minZ - RADIUS },
              { d: b.maxZ - nz, x: nx, z: b.maxZ + RADIUS },
            ].sort((a, b2) => a.d - b2.d);
            nx = pushes[0].x; nz = pushes[0].z;
          }
        }
      }
      const dc = Math.hypot(nx, nz);
      if (dc > WORLD_R) { nx = (nx / dc) * WORLD_R; nz = (nz / dc) * WORLD_R; }
      return [nx, nz];
    }

    // ---- Joystick ----
    const joy = document.getElementById('joy');
    const thumb = joy.querySelector('.thumb');
    let joyId = null;
    function setJoy(cx, cy) {
      const r = joy.getBoundingClientRect();
      let dx = cx - (r.left + r.width / 2), dy = cy - (r.top + r.height / 2);
      const max = r.width / 2, d = Math.hypot(dx, dy);
      if (d > max) { dx = dx / d * max; dy = dy / d * max; }
      thumb.style.transform = `translate(${dx}px, ${dy}px)`;
      move.s = dx / max;
      move.f = -dy / max;
    }
    joy.addEventListener('pointerdown', e => { joyId = e.pointerId; setJoy(e.clientX, e.clientY); joy.setPointerCapture(e.pointerId); });
    joy.addEventListener('pointermove', e => { if (e.pointerId === joyId) setJoy(e.clientX, e.clientY); });
    function endJoy(e) { if (e.pointerId === joyId) { joyId = null; thumb.style.transform = ''; move.f = move.s = 0; } }
    joy.addEventListener('pointerup', endJoy);
    joy.addEventListener('pointercancel', endJoy);

    // ---- Look (drag anywhere else) ----
    let lookId = null, lastLook = null;
    renderer.domElement.addEventListener('pointerdown', e => { lookId = e.pointerId; lastLook = { x: e.clientX, y: e.clientY }; });
    addEventListener('pointermove', e => {
      if (e.pointerId !== lookId || gyroOn) return;
      player.yaw -= (e.clientX - lastLook.x) * 0.005;
      player.pitch -= (e.clientY - lastLook.y) * 0.005;
      player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
      lastLook = { x: e.clientX, y: e.clientY };
    });
    addEventListener('pointerup', e => { if (e.pointerId === lookId) lookId = null; });

    // ---- Keyboard (desktop) ----
    const keys = {};
    addEventListener('keydown', e => { keys[e.code] = true; });
    addEventListener('keyup', e => { keys[e.code] = false; });
    function readKeys() {
      let f = 0, s = 0;
      if (keys.KeyW || keys.ArrowUp) f += 1;
      if (keys.KeyS || keys.ArrowDown) f -= 1;
      if (keys.KeyD || keys.ArrowRight) s += 1;
      if (keys.KeyA || keys.ArrowLeft) s -= 1;
      if (f || s) { move.f = f; move.s = s; }
    }

    // ---- Gyro look (optional) ----
    let gyroOn = false, gyroBase = null;
    const gyroBtn = document.getElementById('gyroBtn');
    gyroBtn.addEventListener('click', async () => {
      if (!gyroOn) {
        if (window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) {
          try { const p = await DeviceOrientationEvent.requestPermission(); if (p !== 'granted') return; } catch (e) { return; }
        }
        gyroOn = true; gyroBase = null; gyroBtn.classList.remove('off');
      } else {
        gyroOn = false; gyroBtn.classList.add('off');
      }
    });
    addEventListener('deviceorientation', e => {
      if (!gyroOn || e.alpha === null) return;
      if (!gyroBase) gyroBase = e.alpha;
      let d = ((e.alpha - gyroBase + 540) % 360) - 180;
      player.yaw = -d * Math.PI / 180;
      player.pitch = Math.max(-1.2, Math.min(1.2, ((e.beta ?? 90) - 90) * Math.PI / 180));
    });

    // ============================================================
    // Sound (WebAudio)
    // ============================================================
    let actx = null, ambientGain = null, muted = false;
    function initAudio() {
      if (actx) return;
      actx = new (window.AudioContext || window.webkitAudioContext)();
      // gentle ambient pad
      ambientGain = actx.createGain();
      ambientGain.gain.value = 0.04;
      ambientGain.connect(actx.destination);
      [220, 277.18, 329.63].forEach((f, i) => {
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        const lfo = actx.createOscillator(), lg = actx.createGain();
        lfo.frequency.value = 0.07 + i * 0.03; lg.gain.value = 0.5;
        lfo.connect(lg).connect(g.gain);
        g.gain.value = 0.5;
        o.connect(g).connect(ambientGain);
        o.start(); lfo.start();
      });
    }
    const muteBtn = document.getElementById('muteBtn');
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      if (ambientGain) ambientGain.gain.value = muted ? 0 : 0.04;
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.classList.toggle('off', muted);
    });

    // ============================================================
    // Main loop
    // ============================================================
    const clock = new THREE.Clock();
    let started = false;
    const screenDiv = document.getElementById('screen');

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, clock.getDelta());
      const t = clock.elapsedTime;

      if (started) {
        readKeys();
        const SPEED = 5.5;
        if (move.f || move.s) {
          const fwdX = -Math.sin(player.yaw), fwdZ = -Math.cos(player.yaw);
          const rgtX = Math.cos(player.yaw), rgtZ = -Math.sin(player.yaw);
          let vx = fwdX * move.f + rgtX * move.s;
          let vz = fwdZ * move.f + rgtZ * move.s;
          const vm = Math.hypot(vx, vz) || 1;
          const nx = player.x + (vx / vm) * SPEED * dt;
          const nz = player.z + (vz / vm) * SPEED * dt;
          [player.x, player.z] = resolveCollisions(nx, nz);
        }
        if (!keys.KeyW && !keys.KeyS && !keys.KeyA && !keys.KeyD && joyId === null &&
            !keys.ArrowUp && !keys.ArrowDown && !keys.ArrowLeft && !keys.ArrowRight) { move.f = move.s = 0; }
      }

      camera.position.set(player.x, EYE, player.z);
      camera.rotation.set(player.pitch, player.yaw, 0, 'YXZ');

      // people animation
      for (const m of people) {
        m.group.position.y = Math.abs(Math.sin(t * 2 + m.phase)) * 0.05;
        if (m.data.region && started) {
          m.wt -= dt;
          if (m.wt <= 0) {
            pickTarget(m);
            m.wt = 2.5 + Math.random() * 4;
          }
          const dx = m.tx - m.group.position.x, dz = m.tz - m.group.position.z;
          const d = Math.hypot(dx, dz);
          if (d > 0.1) {
            m.group.position.x += (dx / d) * 1.1 * dt;
            m.group.position.z += (dz / d) * 1.1 * dt;
            m.faceYaw = Math.atan2(dx, dz);
          }
          m.group.rotation.y += (((m.faceYaw - m.group.rotation.y + Math.PI * 3) % (Math.PI * 2)) - Math.PI) * Math.min(1, dt * 6);
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    // ============================================================
    // Intro screen
    // ============================================================
    function showIntro() {
      screenDiv.innerHTML = `<div class="modal"><div class="card" id="intro">
        <h1>MY WORLD</h1>
        <div style="font-size:2.5rem">🌸🏬🌳</div>
        <p>Wander the park, then step inside the mall — six big shops with shelves full of lovely things to browse!</p>
        <div class="controls-help">🕹️ Drag the circle to walk<br>👆 Swipe the screen to look around<br>⌨️ Or use WASD / arrow keys</div>
        <button class="btn" data-act="go">LET'S GO!</button>
      </div></div>`;
      screenDiv.querySelector('[data-act=go]').addEventListener('click', () => {
        screenDiv.innerHTML = '';
        started = true;
        initAudio();
        if (actx && actx.state === 'suspended') actx.resume();
      });
    }

    showIntro();
  </script>
</body>
</html>
