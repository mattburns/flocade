<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Tables — Flocade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0221;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .wrap {
      width: min(720px, 100%);
      border: 2px solid #ff2e88;
      border-radius: 14px;
      background: rgba(12, 4, 35, 0.95);
      box-shadow: 0 0 26px rgba(255, 46, 136, 0.25);
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      font-size: 0.62rem;
    }
    a.back {
      color: #00f0ff;
      text-decoration: none;
      font-size: 0.62rem;
    }
    .stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat {
      border: 1px solid #3e2f65;
      border-radius: 9px;
      padding: 0.45rem 0.55rem;
      min-width: 110px;
      text-align: center;
      background: rgba(0, 240, 255, 0.06);
      line-height: 1.5;
    }
    .stat strong { color: #ffe600; }
    .prompt {
      text-align: center;
      border: 2px solid #00f0ff;
      border-radius: 10px;
      background: rgba(0, 240, 255, 0.08);
      padding: 1.15rem 0.6rem;
      min-height: 150px;
      display: grid;
      align-content: center;
      gap: 0.75rem;
    }
    .question {
      font-size: clamp(1.25rem, 6vw, 2.4rem);
      color: #ffe600;
      letter-spacing: 0.06em;
      line-height: 1.3;
    }
    .status {
      font-size: 0.62rem;
      color: #9b93b8;
      line-height: 1.75;
      min-height: 2.1em;
    }
    .answers {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
    }
    button {
      border: 2px solid #ff2e88;
      border-radius: 10px;
      background: rgba(255, 46, 136, 0.12);
      color: #e8e6f0;
      font: inherit;
      padding: 0.95rem 0.5rem;
      cursor: pointer;
      min-height: 66px;
      touch-action: manipulation;
      transition: transform 80ms ease, background 150ms ease;
    }
    button:hover, button:focus-visible {
      background: rgba(255, 46, 136, 0.2);
      outline: none;
    }
    button:active { transform: scale(0.97); }
    button[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }
    .controls {
      display: flex;
      justify-content: center;
    }
    #start {
      width: min(300px, 100%);
      border-color: #00f0ff;
      background: rgba(0, 240, 255, 0.12);
    }
    #start:hover, #start:focus-visible { background: rgba(0, 240, 255, 0.2); }
    .hint {
      text-align: center;
      color: #9b93b8;
      font-size: 0.52rem;
      line-height: 1.9;
    }
    @media (max-width: 560px) {
      .answers { grid-template-columns: 1fr; }
      .stat { min-width: 0; flex: 1; }
      .topbar { justify-content: center; }
      .stats { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back" href="../../">&larr; FLOCADE</a>
      <div class="stats">
        <div class="stat">TIME<br><strong id="time">60</strong>s</div>
        <div class="stat">SCORE<br><strong id="score">0</strong></div>
        <div class="stat">BEST<br><strong id="best">0</strong></div>
      </div>
    </div>

    <section class="prompt">
      <h1 class="question" id="question">SPEED TABLES</h1>
      <p class="status" id="status">Tap START. Wrong answer = restart.</p>
    </section>

    <section class="answers" id="answers">
      <button type="button" data-index="0" disabled>—</button>
      <button type="button" data-index="1" disabled>—</button>
      <button type="button" data-index="2" disabled>—</button>
    </section>

    <div class="controls">
      <button type="button" id="start">START 60s RUN</button>
    </div>

    <p class="hint">Keyboard: 1 / 2 / 3 to answer · Enter to start</p>
  </main>

  <script>
    const TIME_LIMIT = 60;
    const MAX_TABLE = 12;
    const QUESTION_SEED = 90412026;
    const STORAGE_KEY = 'flocade-speed-tables-highscore';

    const els = {
      time: document.getElementById('time'),
      score: document.getElementById('score'),
      best: document.getElementById('best'),
      question: document.getElementById('question'),
      status: document.getElementById('status'),
      start: document.getElementById('start'),
      answers: Array.from(document.querySelectorAll('#answers button')),
    };

    let highScore = Math.max(0, Number.parseInt(localStorage.getItem(STORAGE_KEY), 10) || 0);
    let score = 0;
    let timeLeft = TIME_LIMIT;
    let running = false;
    let timerId = null;
    let questionRng = createRng(QUESTION_SEED);
    let currentCorrect = null;

    els.best.textContent = String(highScore);

    els.start.addEventListener('click', () => {
      if (running) return;
      startRun('Go! Answer as many as you can in 60 seconds.');
    });

    els.answers.forEach((button, index) => {
      button.addEventListener('click', () => {
        if (!running) return;
        submitAnswer(Number(button.dataset.value));
      });
      button.setAttribute('aria-label', `Answer option ${index + 1}`);
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !running) {
        event.preventDefault();
        startRun('Go! Answer as many as you can in 60 seconds.');
        return;
      }

      if (!running) return;
      if (event.key >= '1' && event.key <= '3') {
        event.preventDefault();
        const idx = Number(event.key) - 1;
        const button = els.answers[idx];
        if (button && !button.disabled) {
          submitAnswer(Number(button.dataset.value));
        }
      }
    });

    function startRun(message) {
      clearInterval(timerId);
      score = 0;
      timeLeft = TIME_LIMIT;
      running = true;
      questionRng = createRng(QUESTION_SEED);
      currentCorrect = null;
      els.start.textContent = 'RUNNING...';
      els.start.disabled = true;
      setStatus(message);
      updateHud();
      nextQuestion();

      timerId = setInterval(() => {
        timeLeft -= 1;
        updateHud();
        if (timeLeft <= 0) {
          finishRun();
        }
      }, 1000);
    }

    function finishRun() {
      running = false;
      clearInterval(timerId);
      timerId = null;
      disableAnswerButtons();
      els.question.textContent = 'TIME UP!';
      els.start.textContent = 'PLAY AGAIN';
      els.start.disabled = false;
      setStatus(`Final score: ${score}. Keep drilling!`);
      maybeSetHighScore();
      updateHud();
    }

    function restartOnMistake(chosen) {
      running = false;
      clearInterval(timerId);
      timerId = null;
      disableAnswerButtons();
      maybeSetHighScore();
      updateHud();
      els.question.textContent = `${chosen} ≠ ${currentCorrect}`;
      els.status.textContent = 'Wrong answer — run restarted from the beginning.';

      window.setTimeout(() => {
        startRun('Restarted! Same seeded question order, new answer options.');
      }, 700);
    }

    function nextQuestion() {
      const a = randInt(questionRng, 1, MAX_TABLE);
      const b = randInt(questionRng, 1, MAX_TABLE);
      const bigger = Math.max(a, b);
      const smaller = Math.min(a, b);
      currentCorrect = bigger * smaller;

      els.question.textContent = `${bigger} × ${smaller} = ?`;

      const choices = [currentCorrect];
      while (choices.length < 3) {
        const candidate = Math.floor(Math.random() * (MAX_TABLE * MAX_TABLE)) + 1;
        if (!choices.includes(candidate)) choices.push(candidate);
      }

      shuffleArray(choices);
      els.answers.forEach((button, index) => {
        button.textContent = String(choices[index]);
        button.dataset.value = String(choices[index]);
        button.disabled = false;
      });
    }

    function submitAnswer(answer) {
      if (answer === currentCorrect) {
        score += 1;
        maybeSetHighScore();
        updateHud();
        nextQuestion();
      } else {
        restartOnMistake(answer);
      }
    }

    function updateHud() {
      els.time.textContent = String(Math.max(0, timeLeft));
      els.score.textContent = String(score);
      els.best.textContent = String(highScore);
    }

    function setStatus(message) {
      els.status.textContent = message;
    }

    function disableAnswerButtons() {
      els.answers.forEach(button => {
        button.disabled = true;
        button.textContent = '—';
        button.dataset.value = '';
      });
    }

    function maybeSetHighScore() {
      if (score > highScore) {
        highScore = score;
        try {
          localStorage.setItem(STORAGE_KEY, String(highScore));
        } catch (_) {
          // Ignore storage failures.
        }
      }
    }

    function createRng(seed) {
      let state = seed >>> 0;
      return function rng() {
        state += 0x6D2B79F5;
        let t = state;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randInt(rng, min, max) {
      return Math.floor(rng() * (max - min + 1)) + min;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
  </script>
</body>
</html>
