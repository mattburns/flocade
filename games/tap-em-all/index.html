<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tap 'em all — Flocade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0d0221;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 0.9rem;
      font-size: 0.6rem;
      border-bottom: 2px solid #2a1b4d;
      background: rgba(12, 4, 35, 0.95);
      z-index: 5;
    }
    a.back { color: #00f0ff; text-decoration: none; }
    a.back:hover { text-shadow: 0 0 8px #00f0ff; }
    .hud { display: flex; gap: 1rem; align-items: center; }
    .hud span strong { color: #ffe600; }
    .hud .mode-tag { color: #ff2e88; }

    .timerbar {
      height: 10px;
      background: #1a0f38;
      position: relative;
      flex: none;
    }
    .timerbar .fill {
      position: absolute;
      inset: 0;
      transform-origin: left;
      background: linear-gradient(90deg, #00f0ff, #ff2e88);
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
    }

    #arena {
      position: relative;
      flex: 1;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 46, 136, 0.07), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.07), transparent 40%),
        #0d0221;
    }
    #spinLayer {
      position: absolute;
      left: 50%;
      top: 50%;
      will-change: transform;
    }

    .sq {
      position: absolute;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 14px currentColor;
      border: 2px solid rgba(255, 255, 255, 0.55);
      animation: pop-in 160ms ease-out;
      will-change: transform, left, top;
    }
    @keyframes pop-in {
      from { transform: scale(0.2); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .sq.dead {
      animation: pop-out 180ms ease-in forwards;
      pointer-events: none;
    }
    @keyframes pop-out {
      to { transform: scale(1.6); opacity: 0; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
      text-align: center;
      padding: 1rem;
      background: rgba(13, 2, 33, 0.92);
      z-index: 10;
      overflow-y: auto;
    }
    .overlay.hidden { display: none; }
    h1 {
      font-size: clamp(1.1rem, 5vw, 1.9rem);
      color: #ff2e88;
      text-shadow: 0 0 16px rgba(255, 46, 136, 0.7);
      line-height: 1.4;
    }
    .tagline { font-size: 0.6rem; color: #9b93b8; line-height: 1.8; max-width: 480px; }
    .tagline strong { color: #ffe600; }

    .modes { display: grid; gap: 0.8rem; width: min(420px, 92vw); }
    button.mode {
      font: inherit;
      font-size: 0.75rem;
      color: #e8e6f0;
      background: rgba(0, 240, 255, 0.07);
      border: 2px solid var(--c, #00f0ff);
      border-radius: 12px;
      padding: 0.9rem 0.8rem;
      cursor: pointer;
      line-height: 1.7;
      transition: transform 90ms ease, box-shadow 150ms ease;
    }
    button.mode small {
      display: block;
      font-size: 0.52rem;
      color: #9b93b8;
      margin-top: 0.35rem;
    }
    button.mode .best {
      display: block;
      font-size: 0.52rem;
      color: var(--c, #00f0ff);
      margin-top: 0.35rem;
    }
    button.mode:hover, button.mode:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 0 18px var(--c, #00f0ff);
      outline: none;
    }
    button.mode.normal  { --c: #00f0ff; }
    button.mode.tricky  { --c: #ffe600; }
    button.mode.extreme { --c: #ff2e88; }

    .bigmsg {
      font-size: clamp(1rem, 5vw, 1.7rem);
      color: #ffe600;
      text-shadow: 0 0 16px rgba(255, 230, 0, 0.7);
      line-height: 1.5;
    }
    .submsg { font-size: 0.62rem; color: #9b93b8; line-height: 1.9; }
    .submsg strong { color: #00f0ff; }
    .newbest {
      font-size: 0.7rem;
      color: #ff2e88;
      animation: flash 0.7s steps(2) infinite;
    }
    @keyframes flash { 50% { opacity: 0.25; } }

    .board {
      border: 2px solid #3e2f65;
      border-radius: 12px;
      padding: 0.8rem 1.1rem;
      background: rgba(0, 240, 255, 0.05);
      font-size: 0.58rem;
      line-height: 2.1;
      min-width: min(300px, 85vw);
    }
    .board h2 { font-size: 0.62rem; color: #00f0ff; margin-bottom: 0.5rem; }
    .board ol { list-style: none; counter-reset: rank; }
    .board li { counter-increment: rank; display: flex; justify-content: space-between; gap: 1rem; }
    .board li::before { content: counter(rank) "."; color: #9b93b8; margin-right: 0.5rem; }
    .board li strong { color: #ffe600; }
    .board .empty { color: #9b93b8; }

    .btnrow { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
    button.action {
      font: inherit;
      font-size: 0.65rem;
      color: #0d0221;
      background: #00f0ff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(0, 240, 255, 0.5);
      transition: transform 90ms ease;
    }
    button.action.pink { background: #ff2e88; color: #fff; box-shadow: 0 0 14px rgba(255, 46, 136, 0.5); }
    button.action:hover, button.action:focus-visible { transform: translateY(-2px); outline: none; }

    .countdown {
      font-size: clamp(2.2rem, 12vw, 4rem);
      color: #00f0ff;
      text-shadow: 0 0 24px #00f0ff;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../../">&larr; Flocade</a>
    <div class="hud">
      <span class="mode-tag" id="hudMode"></span>
      <span>LVL <strong id="hudLevel">-</strong></span>
      <span>LEFT <strong id="hudLeft">-</strong></span>
    </div>
  </div>
  <div class="timerbar"><div class="fill" id="timerFill" style="transform: scaleX(0)"></div></div>

  <div id="arena">
    <div id="spinLayer"></div>

    <div class="overlay" id="menuOverlay">
      <h1>TAP 'EM ALL</h1>
      <p class="tagline">Tap away every square before <strong>3 seconds</strong> run out. Each level adds one more square. How far can you get?</p>
      <div class="modes">
        <button class="mode normal" data-mode="normal">
          NORMAL
          <small>Squares sit still. Easy, right?</small>
          <span class="best" id="bestNormal"></span>
        </button>
        <button class="mode tricky" data-mode="tricky">
          TRICKY
          <small>The whole screen slowly spins!</small>
          <span class="best" id="bestTricky"></span>
        </button>
        <button class="mode extreme" data-mode="extreme">
          EXTREME
          <small>Fidgety squares scurry about like little animals!</small>
          <span class="best" id="bestExtreme"></span>
        </button>
      </div>
    </div>

    <div class="overlay hidden" id="msgOverlay">
      <div class="bigmsg" id="msgBig"></div>
      <div class="submsg" id="msgSub"></div>
    </div>

    <div class="overlay hidden" id="overOverlay">
      <div class="bigmsg" id="overTitle">TIME'S UP!</div>
      <div class="submsg" id="overStats"></div>
      <div class="newbest hidden" id="overNewBest">&#9733; NEW BEST! &#9733;</div>
      <div class="board">
        <h2 id="boardTitle">SCOREBOARD</h2>
        <ol id="boardList"></ol>
      </div>
      <div class="btnrow">
        <button class="action pink" id="btnRetry">PLAY AGAIN</button>
        <button class="action" id="btnMenu">MENU</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    const LEVEL_TIME = 3000;          // every level is 3 seconds
    const SQUARES_FOR_LEVEL = lvl => lvl + 2;  // level 1 => 3 squares
    const COLORS = ['#ff2e88', '#00f0ff', '#ffe600', '#7dff5e', '#b26bff', '#ff8c3a'];
    const MODE_NAMES = { normal: 'NORMAL', tricky: 'TRICKY', extreme: 'EXTREME' };
    const STORE_KEY = 'flocade-tap-em-all-scores';

    const arena = document.getElementById('arena');
    const spinLayer = document.getElementById('spinLayer');
    const timerFill = document.getElementById('timerFill');
    const hudMode = document.getElementById('hudMode');
    const hudLevel = document.getElementById('hudLevel');
    const hudLeft = document.getElementById('hudLeft');
    const menuOverlay = document.getElementById('menuOverlay');
    const msgOverlay = document.getElementById('msgOverlay');
    const msgBig = document.getElementById('msgBig');
    const msgSub = document.getElementById('msgSub');
    const overOverlay = document.getElementById('overOverlay');
    const overStats = document.getElementById('overStats');
    const overNewBest = document.getElementById('overNewBest');
    const boardTitle = document.getElementById('boardTitle');
    const boardList = document.getElementById('boardList');

    // ---------- scoreboards (top 5 per difficulty) ----------
    function loadScores() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
        return {
          normal: Array.isArray(raw.normal) ? raw.normal : [],
          tricky: Array.isArray(raw.tricky) ? raw.tricky : [],
          extreme: Array.isArray(raw.extreme) ? raw.extreme : [],
        };
      } catch { return { normal: [], tricky: [], extreme: [] }; }
    }
    function saveScore(mode, level) {
      const scores = loadScores();
      const prevBest = scores[mode][0] ? scores[mode][0].level : 0;
      scores[mode].push({ level, date: new Date().toISOString().slice(0, 10) });
      scores[mode].sort((a, b) => b.level - a.level);
      scores[mode] = scores[mode].slice(0, 5);
      try { localStorage.setItem(STORE_KEY, JSON.stringify(scores)); } catch {}
      return level > prevBest;
    }
    function renderMenuBests() {
      const scores = loadScores();
      for (const mode of ['normal', 'tricky', 'extreme']) {
        const el = document.getElementById('best' + mode[0].toUpperCase() + mode.slice(1));
        const best = scores[mode][0];
        el.textContent = best ? 'BEST: LVL ' + best.level : 'BEST: -';
      }
    }
    function renderBoard(mode, justScored) {
      boardTitle.textContent = MODE_NAMES[mode] + ' SCOREBOARD';
      const entries = loadScores()[mode];
      boardList.innerHTML = '';
      if (!entries.length) {
        boardList.innerHTML = '<li class="empty">No scores yet</li>';
        return;
      }
      let highlighted = false;
      for (const e of entries) {
        const li = document.createElement('li');
        const lvl = document.createElement(!highlighted && e.level === justScored ? 'strong' : 'span');
        if (lvl.tagName === 'STRONG') highlighted = true;
        lvl.textContent = 'LVL ' + e.level;
        const date = document.createElement('span');
        date.textContent = e.date;
        li.append(lvl, date);
        boardList.appendChild(li);
      }
    }

    // ---------- tiny sounds ----------
    let audioCtx = null;
    function beep(freq, dur, type = 'square', vol = 0.08) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
      } catch {}
    }

    // ---------- game state ----------
    let mode = 'normal';
    let level = 0;
    let squares = [];        // { el, x, y, size, vx, vy, jitterT } (x,y relative to spinLayer centre)
    let remaining = 0;
    let running = false;
    let levelEndsAt = 0;
    let spinAngle = 0;
    let rafId = 0;
    let lastFrame = 0;
    let msgTimer = 0;

    function arenaSize() {
      return { w: arena.clientWidth, h: arena.clientHeight };
    }

    // Radius of the circle squares may occupy (so spinning never carries one off-screen)
    function fieldRadius() {
      const { w, h } = arenaSize();
      return Math.min(w, h) / 2 - 8;
    }

    function squareSize(count) {
      const { w, h } = arenaSize();
      const base = Math.min(w, h) * 0.16;
      // shrink a little as the field crowds up, but never below a comfy tap target
      return Math.max(44, Math.min(80, base - count * 1.5));
    }

    function clearSquares() {
      spinLayer.innerHTML = '';
      squares = [];
    }

    function spawnSquares(count) {
      clearSquares();
      const size = squareSize(count);
      const R = fieldRadius() - size * 0.75;
      const placed = [];
      for (let i = 0; i < count; i++) {
        let x = 0, y = 0, ok = false;
        for (let tries = 0; tries < 80 && !ok; tries++) {
          const ang = Math.random() * Math.PI * 2;
          const rad = Math.sqrt(Math.random()) * R;
          x = Math.cos(ang) * rad;
          y = Math.sin(ang) * rad;
          ok = placed.every(p => Math.hypot(p.x - x, p.y - y) > size * 1.15);
        }
        placed.push({ x, y });
        const el = document.createElement('div');
        el.className = 'sq';
        const color = COLORS[i % COLORS.length];
        el.style.cssText = `width:${size}px;height:${size}px;background:${color};color:${color};`;
        const sq = {
          el, x, y, size,
          vx: 0, vy: 0, jitterT: 0,
          dead: false,
        };
        el.addEventListener('pointerdown', ev => {
          ev.preventDefault();
          tapSquare(sq);
        });
        spinLayer.appendChild(el);
        squares.push(sq);
      }
      positionSquares();
    }

    function positionSquares() {
      for (const sq of squares) {
        sq.el.style.left = (sq.x - sq.size / 2) + 'px';
        sq.el.style.top = (sq.y - sq.size / 2) + 'px';
        // counter-rotate so squares stay upright while the field spins
        if (mode === 'tricky') sq.el.style.transform = `rotate(${-spinAngle}deg)`;
      }
    }

    function tapSquare(sq) {
      if (!running || sq.dead) return;
      sq.dead = true;
      sq.el.classList.add('dead');
      setTimeout(() => sq.el.remove(), 200);
      remaining--;
      hudLeft.textContent = remaining;
      beep(500 + (squares.length - remaining) * 70, 0.09, 'square');
      if (remaining <= 0) levelCleared();
    }

    // ---------- level flow ----------
    function startGame(chosenMode) {
      mode = chosenMode;
      level = 0;
      spinAngle = 0;
      hudMode.textContent = MODE_NAMES[mode];
      menuOverlay.classList.add('hidden');
      overOverlay.classList.add('hidden');
      nextLevel();
    }

    function nextLevel() {
      level++;
      const count = SQUARES_FOR_LEVEL(level);
      hudLevel.textContent = level;
      hudLeft.textContent = count;
      showMsg('LEVEL ' + level, count + ' squares &middot; 3 seconds', 900, () => {
        spawnSquares(count);
        remaining = count;
        running = true;
        levelEndsAt = performance.now() + LEVEL_TIME;
        beep(880, 0.12, 'triangle');
      });
    }

    function levelCleared() {
      running = false;
      const spare = Math.max(0, levelEndsAt - performance.now());
      beep(1046, 0.15, 'triangle'); setTimeout(() => beep(1318, 0.2, 'triangle'), 120);
      timerFill.style.transform = 'scaleX(0)';
      showMsg('CLEARED!', (spare / 1000).toFixed(1) + 's to spare', 850, nextLevel);
    }

    function gameOver() {
      running = false;
      clearSquares();
      timerFill.style.transform = 'scaleX(0)';
      beep(220, 0.4, 'sawtooth'); setTimeout(() => beep(110, 0.5, 'sawtooth'), 180);
      const cleared = level - 1;
      const isBest = cleared > 0 ? saveScore(mode, cleared) : false;
      overStats.innerHTML = cleared > 0
        ? 'You reached <strong>LEVEL ' + level + '</strong><br>and cleared ' + cleared + (cleared === 1 ? ' level' : ' levels')
        : 'Not a single level cleared!<br>Those 3 squares beat you&hellip;';
      overNewBest.classList.toggle('hidden', !isBest);
      renderBoard(mode, cleared);
      overOverlay.classList.remove('hidden');
    }

    function showMsg(big, sub, ms, then) {
      clearTimeout(msgTimer);
      msgBig.innerHTML = big;
      msgSub.innerHTML = sub;
      msgOverlay.classList.remove('hidden');
      msgTimer = setTimeout(() => {
        msgOverlay.classList.add('hidden');
        then && then();
      }, ms);
    }

    // ---------- animation loop ----------
    function frame(now) {
      rafId = requestAnimationFrame(frame);
      const dt = Math.min(50, now - lastFrame) / 1000;
      lastFrame = now;

      // keep the spin layer centred
      const { w, h } = arenaSize();
      let transform = 'translate(-50%, -50%)';

      if (running) {
        // timer
        const left = levelEndsAt - now;
        timerFill.style.transform = 'scaleX(' + Math.max(0, left / LEVEL_TIME) + ')';
        if (left <= 0) { gameOver(); return; }

        if (mode === 'tricky') {
          spinAngle += 40 * dt;                    // slow, relentless spin
          positionSquares();
        } else if (mode === 'extreme') {
          const R = fieldRadius();
          for (const sq of squares) {
            if (sq.dead) continue;
            // fidgety wander: random accelerations + occasional panicked darts
            sq.jitterT -= dt;
            if (sq.jitterT <= 0) {
              sq.jitterT = 0.15 + Math.random() * 0.35;
              const panic = Math.random() < 0.25 ? 3 : 1;
              sq.vx += (Math.random() - 0.5) * 500 * panic;
              sq.vy += (Math.random() - 0.5) * 500 * panic;
            }
            sq.vx *= 0.96; sq.vy *= 0.96;
            const speed = Math.hypot(sq.vx, sq.vy);
            const maxV = 260;
            if (speed > maxV) { sq.vx *= maxV / speed; sq.vy *= maxV / speed; }
            sq.x += sq.vx * dt;
            sq.y += sq.vy * dt;
            // stay inside the field circle
            const d = Math.hypot(sq.x, sq.y);
            const lim = R - sq.size * 0.75;
            if (d > lim) {
              sq.x *= lim / d; sq.y *= lim / d;
              sq.vx *= -0.6; sq.vy *= -0.6;
            }
          }
          positionSquares();
        }
      }

      if (mode === 'tricky') transform += ` rotate(${spinAngle}deg)`;
      spinLayer.style.transform = transform;
      spinLayer.style.width = '0px';
      spinLayer.style.height = '0px';
      spinLayer.style.left = (w / 2) + 'px';
      spinLayer.style.top = (h / 2) + 'px';
    }

    // ---------- wiring ----------
    document.querySelectorAll('button.mode').forEach(btn => {
      btn.addEventListener('click', () => startGame(btn.dataset.mode));
    });
    document.getElementById('btnRetry').addEventListener('click', () => startGame(mode));
    document.getElementById('btnMenu').addEventListener('click', () => {
      overOverlay.classList.add('hidden');
      hudLevel.textContent = '-';
      hudLeft.textContent = '-';
      hudMode.textContent = '';
      renderMenuBests();
      menuOverlay.classList.remove('hidden');
    });

    renderMenuBests();
    lastFrame = performance.now();
    rafId = requestAnimationFrame(frame);
  </script>
</body>
</html>
