<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DJ Panel — Flocade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0221;
      --card: #1a0b3d;
      --panel: #14082e;
      --pink: #ff2e88;
      --cyan: #00f0ff;
      --yellow: #ffe600;
      --text: #e8e6f0;
      --dim: #9b93b8;
    }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% -20%, #2b0a5e 0%, transparent 60%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    a.back { color: var(--cyan); font-family: 'Press Start 2P', monospace; font-size: 0.7rem; text-decoration: none; align-self: flex-start; }
    h1 { font-family: 'Press Start 2P', monospace; font-size: 1.3rem; color: var(--yellow); text-shadow: 3px 3px 0 var(--pink); margin: 0.75rem 0 0.25rem; }
    .subtitle { color: var(--dim); font-size: 0.85rem; margin-bottom: 0.75rem; }

    .deck {
      background: var(--card);
      border: 2px solid var(--pink);
      border-radius: 18px;
      box-shadow: 0 0 24px rgba(255, 46, 136, 0.3);
      width: 100%;
      max-width: 640px;
      padding: 1rem;
      display: flex;
      gap: 1rem;
    }
    .main { flex: 1; display: flex; flex-direction: column; gap: 0.8rem; min-width: 0; }

    /* transport row */
    .transport {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--panel);
      border-radius: 12px;
      padding: 0.7rem 1rem;
    }
    .vinyl {
      width: 64px; height: 64px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, var(--yellow) 0 12%, #111 13% 30%, #222 31% 36%, #111 37% 58%, #222 59% 64%, #111 65% 100%);
      border: 3px solid #000;
      animation: spin 1.8s linear infinite;
      animation-play-state: paused;
      flex: 0 0 auto;
    }
    .vinyl.on { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .playbtn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .playbtn.on { background: var(--cyan); color: #14082e; }

    .speed { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; min-width: 70px; }
    .speed label { font-size: 0.7rem; color: var(--dim); display: flex; justify-content: space-between; }
    .speed input { width: 100%; accent-color: var(--pink); }

    .beat-dots { display: flex; gap: 6px; justify-content: center; }
    .beat-dots span { width: 10px; height: 10px; border-radius: 50%; background: #2b1a55; }
    .beat-dots span.on { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }

    /* pads */
    .pads { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .pad {
      border: none;
      border-radius: 12px;
      aspect-ratio: 1.25;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: rgba(0, 0, 0, 0.65);
      cursor: pointer;
      transition: transform 0.06s, filter 0.06s;
      touch-action: none;
    }
    .pad.lit, .pad:active { transform: scale(0.93); filter: brightness(1.5) saturate(1.3); box-shadow: 0 0 18px currentColor; }
    .pad.drum { background: #3a2a63; color: var(--text); }
    .pad.fx { color: rgba(0, 0, 0, 0.75); }

    /* genre column */
    .genres { display: flex; flex-direction: column; gap: 0.6rem; justify-content: center; }
    .genre {
      background: var(--panel);
      border: 3px solid #2b1a55;
      border-radius: 14px;
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 0.9rem 0.8rem;
      cursor: pointer;
      text-align: center;
      line-height: 1.6;
    }
    .genre .em { display: block; font-size: 1.6rem; margin-bottom: 0.3rem; }
    .genre.on { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 14px rgba(255, 230, 0, 0.35); }

    .hint { color: var(--dim); font-size: 0.75rem; margin-top: 0.8rem; text-align: center; line-height: 1.7; }

    @media (max-width: 540px) {
      .deck { flex-direction: column; }
      .genres { flex-direction: row; }
      .genre { flex: 1; padding: 0.6rem 0.4rem; }
    }
  </style>
</head>
<body>
  <a class="back" href="../../">&larr; FLOCADE</a>
  <h1>DJ PANEL</h1>
  <p class="subtitle">Drop the beat, switch the style, jam! 🎧</p>

  <div class="deck">
    <div class="main">
      <div class="transport">
        <div class="vinyl" id="vinyl"></div>
        <button class="playbtn" id="play">▶ PLAY</button>
        <div class="speed">
          <label><span>🐢</span><span>SPEED</span><span>🐇</span></label>
          <input type="range" id="speed" min="80" max="140" value="100">
          <div class="beat-dots" id="dots"><span></span><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="pads" id="notepads"></div>
      <div class="pads" id="drumpads"></div>
    </div>
    <div class="genres" id="genres"></div>
  </div>
  <p class="hint">Tap the coloured pads to play — you can't hit a wrong note!<br>⌨️ 1–8 notes · Z X C V drums · A S D F effects</p>

  <script>
    // ---------- genre definitions ----------
    const mtof = m => 440 * Math.pow(2, (m - 69) / 12);
    const chug = r => [r, 0, r, 0, r, 0, r, 0, r, 0, r, 0, r, 0, r, 0];
    const popBar = r => [r, 0, 0, r, 0, 0, r, 0, 0, 0, r, 0, r, 0, 0, 0];
    const quarters = (a, b, c, d) => [a, 0, 0, 0, b, 0, 0, 0, c, 0, 0, 0, d, 0, 0, 0];

    const GENRES = {
      rock: {
        label: 'ROCK', em: '🎸', bpm: 122, swing: 0,
        scale: [52, 55, 57, 59, 62, 64, 67, 69],            // E minor pentatonic
        kick: [0, 8, 10], snare: [4, 12], hat: [0, 2, 4, 6, 8, 10, 12, 14], ride: false,
        bass: [...chug(40), ...chug(40), ...chug(43), ...chug(45)],
        voice: 'power',
      },
      jazz: {
        label: 'JAZZ', em: '🎷', bpm: 138, swing: 0.65,
        scale: [50, 53, 55, 56, 57, 60, 62, 65],            // D blues
        kick: [0], snare: [7], hat: [4, 12], ride: true,
        ridePat: [0, 4, 6, 8, 12, 14],
        bass: [...quarters(38, 41, 45, 48), ...quarters(50, 48, 45, 41), ...quarters(43, 47, 50, 53), ...quarters(48, 45, 43, 40)],
        voice: 'ep',
      },
      pop: {
        label: 'POP', em: '🎤', bpm: 116, swing: 0,
        scale: [60, 62, 64, 67, 69, 72, 74, 76],            // C major pentatonic
        kick: [0, 4, 8, 12], snare: [4, 12], hat: [2, 6, 10, 14], ride: false,
        bass: [...popBar(36), ...popBar(33), ...popBar(41), ...popBar(43)],
        voice: 'pluck',
      },
    };
    const PAD_COLOURS = ['#ff4757', '#ff7f2a', '#ffe600', '#7ed957', '#00f0ff', '#4a7dff', '#a55eea', '#ff9ec7'];

    // ---------- audio engine ----------
    let ctx = null, master, drumBus, musicBus;
    function audio() {
      if (ctx) return ctx;
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -18;
      comp.ratio.value = 6;
      comp.connect(ctx.destination);
      master = comp;
      drumBus = ctx.createGain(); drumBus.gain.value = 0.9; drumBus.connect(master);
      musicBus = ctx.createGain(); musicBus.gain.value = 0.75; musicBus.connect(master);
      return ctx;
    }
    function env(t, peak, decay, node) {
      node.gain.setValueAtTime(0.0001, t);
      node.gain.exponentialRampToValueAtTime(peak, t + 0.008);
      node.gain.exponentialRampToValueAtTime(0.0001, t + decay);
    }
    function noiseBuffer() {
      const b = ctx.createBuffer(1, ctx.sampleRate * 1, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      return b;
    }
    let _noise;
    function playNoise(t, decay, peak, filterType, freq) {
      _noise = _noise || noiseBuffer();
      const src = ctx.createBufferSource(); src.buffer = _noise; src.loop = true;
      const f = ctx.createBiquadFilter(); f.type = filterType; f.frequency.value = freq;
      const g = ctx.createGain();
      env(t, peak, decay, g);
      src.connect(f).connect(g).connect(drumBus);
      src.start(t); src.stop(t + decay + 0.05);
    }

    // drums
    function kick(t) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.setValueAtTime(150, t);
      o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
      env(t, 1.0, 0.3, g);
      o.connect(g).connect(drumBus);
      o.start(t); o.stop(t + 0.32);
    }
    function snare(t, soft) {
      playNoise(t, 0.16, soft ? 0.25 : 0.6, 'bandpass', 1800);
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 185;
      env(t, soft ? 0.15 : 0.35, 0.1, g);
      o.connect(g).connect(drumBus);
      o.start(t); o.stop(t + 0.12);
    }
    const hat = (t, open) => playNoise(t, open ? 0.25 : 0.05, 0.3, 'highpass', 7500);
    const ride = t => playNoise(t, 0.4, 0.18, 'bandpass', 9000);
    const crash = t => playNoise(t, 1.1, 0.45, 'highpass', 5000);

    // bass
    function bassNote(t, midi, genre) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = genre === 'jazz' ? 'triangle' : 'sawtooth';
      o.frequency.value = mtof(midi);
      f.type = 'lowpass'; f.frequency.value = genre === 'jazz' ? 500 : 350;
      const dur = genre === 'jazz' ? 0.5 : 0.22;
      env(t, 0.55, dur, g);
      o.connect(f).connect(g).connect(musicBus);
      o.start(t); o.stop(t + dur + 0.05);
    }

    // melodic pad voices
    function playPadNote(midi) {
      const t = audio().currentTime;
      const voice = GENRES[genre].voice;
      if (voice === 'power') {
        for (const det of [-7, 7]) {
          const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
          o.type = 'sawtooth'; o.frequency.value = mtof(midi); o.detune.value = det;
          f.type = 'lowpass'; f.frequency.value = 1400;
          env(t, 0.3, 0.45, g);
          o.connect(f).connect(g).connect(musicBus);
          o.start(t); o.stop(t + 0.5);
        }
      } else if (voice === 'ep') {
        const specs = [[0, 'sine', 0.5, 0.9], [12, 'triangle', 0.16, 0.7], [19, 'sine', 0.06, 0.5]];
        for (const [off, type, peak, dec] of specs) {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = type; o.frequency.value = mtof(midi + off);
          env(t, peak, dec, g);
          o.connect(g).connect(musicBus);
          o.start(t); o.stop(t + dec + 0.05);
        }
      } else { // pluck
        const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
        o.type = 'square'; o.frequency.value = mtof(midi);
        f.type = 'lowpass';
        f.frequency.setValueAtTime(3200, t);
        f.frequency.exponentialRampToValueAtTime(320, t + 0.18);
        env(t, 0.4, 0.3, g);
        o.connect(f).connect(g).connect(musicBus);
        o.start(t); o.stop(t + 0.35);
      }
    }

    // FX one-shots
    const FX = {
      airhorn(t) {
        for (const det of [0, -15, 12]) {
          const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(466, t);
          o.frequency.setValueAtTime(466, t + 0.25);
          o.frequency.exponentialRampToValueAtTime(415, t + 0.55);
          o.detune.value = det;
          f.type = 'bandpass'; f.frequency.value = 900; f.Q.value = 1.2;
          env(t, 0.5, 0.7, g);
          o.connect(f).connect(g).connect(drumBus);
          o.start(t); o.stop(t + 0.75);
        }
      },
      laser(t) {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(2400, t);
        o.frequency.exponentialRampToValueAtTime(90, t + 0.3);
        env(t, 0.5, 0.32, g);
        o.connect(g).connect(drumBus);
        o.start(t); o.stop(t + 0.35);
      },
      rewind(t) {
        for (let i = 0; i < 3; i++) {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'sawtooth';
          const s = t + i * 0.16;
          o.frequency.setValueAtTime(180, s);
          o.frequency.exponentialRampToValueAtTime(1100, s + 0.13);
          env(s, 0.18, 0.14, g);
          o.connect(g).connect(drumBus);
          o.start(s); o.stop(s + 0.16);
        }
      },
      ufo(t) {
        const o = ctx.createOscillator(), g = ctx.createGain(), v = ctx.createOscillator(), vg = ctx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(600, t);
        o.frequency.linearRampToValueAtTime(1400, t + 0.6);
        v.frequency.value = 18; vg.gain.value = 70;
        v.connect(vg).connect(o.frequency);
        env(t, 0.3, 0.65, g);
        o.connect(g).connect(drumBus);
        o.start(t); v.start(t); o.stop(t + 0.7); v.stop(t + 0.7);
      },
    };

    // ---------- sequencer (lookahead scheduler) ----------
    let genre = 'pop', playing = false, step = 0, nextTime = 0, speedPct = 100;

    function secsPer16th() { return 60 / (GENRES[genre].bpm * speedPct / 100) / 4; }

    function scheduleStep(s, t) {
      const g = GENRES[genre];
      const bar16 = s % 16;
      // swing: push the off-beat 8ths late
      if (g.swing && bar16 % 4 === 2) t += (g.swing - 0.5) * 2 * secsPer16th() * 2;

      if (g.kick.includes(bar16)) kick(t);
      if (g.snare.includes(bar16)) snare(t, g.ride);          // jazz snare is a soft ghost
      if (g.ride) { if (g.ridePat.includes(bar16)) ride(t); if (g.hat.includes(bar16)) hat(t, false); }
      else if (g.hat.includes(bar16)) hat(t, genre === 'pop' && bar16 % 4 === 2);
      const b = g.bass[s % 64];
      if (b) bassNote(t, b, genre);

      if (bar16 % 4 === 0) {
        const beatIdx = (bar16 / 4) % 4;
        setTimeout(() => flashDot(beatIdx), Math.max(0, (t - ctx.currentTime) * 1000));
      }
    }

    function tickScheduler() {
      if (!playing) return;
      while (nextTime < ctx.currentTime + 0.12) {
        scheduleStep(step, nextTime);
        nextTime += secsPer16th();
        step = (step + 1) % 64;
      }
    }
    setInterval(tickScheduler, 25);

    // ---------- UI ----------
    const playBtn = document.getElementById('play');
    const vinyl = document.getElementById('vinyl');
    const dots = [...document.getElementById('dots').children];
    const notepads = document.getElementById('notepads');
    const drumpads = document.getElementById('drumpads');
    const genresDiv = document.getElementById('genres');

    function flashDot(i) {
      dots.forEach((d, j) => d.classList.toggle('on', j === i));
    }

    playBtn.addEventListener('click', () => {
      audio();
      if (ctx.state === 'suspended') ctx.resume();
      playing = !playing;
      if (playing) { step = 0; nextTime = ctx.currentTime + 0.06; crash(ctx.currentTime); }
      playBtn.textContent = playing ? '◼ STOP' : '▶ PLAY';
      playBtn.classList.toggle('on', playing);
      vinyl.classList.toggle('on', playing);
      if (!playing) dots.forEach(d => d.classList.remove('on'));
    });

    document.getElementById('speed').addEventListener('input', e => { speedPct = +e.target.value; });

    function makePad(parent, label, color, extraClass, fire) {
      const b = document.createElement('button');
      b.className = 'pad ' + extraClass;
      b.textContent = label;
      if (color) b.style.background = `linear-gradient(160deg, ${color}, ${color}99)`;
      b.style.color = color || '';
      b.addEventListener('pointerdown', e => {
        e.preventDefault();
        audio();
        if (ctx.state === 'suspended') ctx.resume();
        fire();
        b.classList.add('lit');
      });
      b.addEventListener('pointerup', () => b.classList.remove('lit'));
      b.addEventListener('pointerleave', () => b.classList.remove('lit'));
      parent.appendChild(b);
      return b;
    }

    const noteEls = PAD_COLOURS.map((c, i) =>
      makePad(notepads, String(i + 1), c, '', () => playPadNote(GENRES[genre].scale[i])));

    const drumDefs = [
      ['KICK', () => kick(ctx.currentTime)],
      ['SNARE', () => snare(ctx.currentTime, false)],
      ['HAT', () => hat(ctx.currentTime, false)],
      ['CRASH', () => crash(ctx.currentTime)],
    ];
    const fxDefs = [
      ['📯 HORN', 'airhorn'], ['✨ LASER', 'laser'], ['⏪ REWIND', 'rewind'], ['🛸 UFO', 'ufo'],
    ];
    const drumEls = drumDefs.map(([l, f]) => makePad(drumpads, l, null, 'drum', f));
    const fxEls = fxDefs.map(([l, k], i) =>
      makePad(drumpads, l, ['#ffe600', '#00f0ff', '#ff9ec7', '#7ed957'][i], 'fx', () => FX[k](ctx.currentTime)));

    for (const key of Object.keys(GENRES)) {
      const g = GENRES[key];
      const b = document.createElement('button');
      b.className = 'genre' + (key === genre ? ' on' : '');
      b.innerHTML = `<span class="em">${g.em}</span>${g.label}`;
      b.addEventListener('click', () => {
        genre = key;
        genresDiv.querySelectorAll('.genre').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
      });
      genresDiv.appendChild(b);
    }

    // keyboard play
    const KEYMAP = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Digit5: 4, Digit6: 5, Digit7: 6, Digit8: 7 };
    const DRUMKEYS = { KeyZ: 0, KeyX: 1, KeyC: 2, KeyV: 3 };
    const FXKEYS = { KeyA: 0, KeyS: 1, KeyD: 2, KeyF: 3 };
    addEventListener('keydown', e => {
      if (e.repeat) return;
      let el = null;
      if (e.code in KEYMAP) el = noteEls[KEYMAP[e.code]];
      if (e.code in DRUMKEYS) el = drumEls[DRUMKEYS[e.code]];
      if (e.code in FXKEYS) el = fxEls[FXKEYS[e.code]];
      if (el) {
        el.dispatchEvent(new PointerEvent('pointerdown'));
        setTimeout(() => el.classList.remove('lit'), 120);
      }
    });
  </script>
</body>
</html>
